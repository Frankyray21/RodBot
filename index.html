<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formation opérateur — RodBot LP</title>
<meta name="description" content="Formation a l exploitation du systeme robotise Borterra RodBot LP, basee sur le manuel de l operateur OM 10667.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<!-- Gabarit declaratif d origine (interprete par app.js). Ne pas executer comme HTML. -->
<script type="text/html" id="rb-template">
<div style="min-height:100vh;display:flex;flex-direction:column">

  <!-- ============ BARRE SUPÉRIEURE ============ -->
  <header style="position:sticky;top:0;z-index:50;background:rgba(20,20,19,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#FAF9F5;border-bottom:1px solid rgba(255,255,255,.1)">
    <div style="max-width:1180px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;gap:18px">
      <button onClick="{{ goHome }}" style="display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;padding:0">
        <span style="text-align:left;line-height:1">
          <span style="display:block;font-weight:900;font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:#FAF9F5">RODBOT LP</span>
          <span style="display:block;font-weight:700;font-size:9.5px;letter-spacing:.26em;color:#989898;margin-top:3px">FORMATION OPÉRATEUR</span>
        </span>
      </button>
      <div style="flex:1"></div>
      <a href="{{ manualUrl }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.24);padding:8px 13px;font-weight:700;font-size:10.5px;letter-spacing:.12em;color:#FAF9F5;transition:border-color .15s,color .15s" style-hover="border-color:#D92624;color:#FFFFFF">
        <span style="font-weight:800;font-size:10px;background:#D92624;color:#FFFFFF;padding:2px 6px">PDF</span>
        MANUEL ↗
      </a>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:120px;height:8px;background:rgba(255,255,255,.16);overflow:hidden">
          <div style="height:100%;background:#D92624;transition:width .5s cubic-bezier(.4,0,.2,1);width: {{ progressPct }}%"></div>
        </div>
        <span style="font-weight:800;font-size:14px;color:#FAF9F5;min-width:38px;text-align:right">{{ progressPct }}%</span>
      </div>
    </div>
  </header>

  <main style="flex:1">

    <!-- ============ ACCUEIL ============ -->
    <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <div style="animation:rbFade .4s ease both">

      <!-- HERO -->
      <section class="mr-ghost mr-ghost-dark mr-grain" data-ghost="RodBot" style="position:relative;background:#141413;color:#FAF9F5;overflow:hidden">
        <div style="position:absolute;inset:0;opacity:.5;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(180deg,rgba(0,0,0,.85),transparent 86%);-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.85),transparent 86%)"></div>
        <div style="max-width:1180px;margin:0 auto;padding:56px 28px 46px;position:relative">
          <div style="display:grid;grid-template-columns:1.08fr .92fr;gap:46px;align-items:center">
            <div class="rb-reveal">
              <div style="display:inline-flex;align-items:center;gap:10px;background:#D92624;padding:7px 14px;margin-bottom:26px">
                <span style="width:7px;height:7px;background:#FFFFFF;animation:rbPulse 2s ease-in-out infinite"></span>
                <span style="font-weight:800;font-size:10.5px;letter-spacing:.16em;color:#FFFFFF">MANUEL DE L'OPÉRATEUR · OM 10667 · R0</span>
              </div>
              <h1 style="font-weight:900;font-size:54px;line-height:1.12;letter-spacing:.005em;text-transform:uppercase;margin:0 0 20px;color:#FAF9F5">Maîtriser le<br><span style="color:#D92624">RodBot LP</span></h1>
              <p style="font-size:17px;line-height:1.55;color:#B8B7B2;max-width:530px;margin:0 0 30px">Formation complète à l'exploitation du système robotisé de manutention de tiges de forage — bâtie sur l'intégralité du manuel de l'opérateur. Chaque leçon renvoie à la page exacte du document.</p>
              <div style="display:flex;gap:14px;flex-wrap:wrap">
                <button onClick="{{ startFirst }}" style="background:#D92624;color:#FFFFFF;border:none;padding:16px 28px;font-weight:800;font-size:14px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:transform .15s,background .15s" style-hover="background:#B71F1D;transform:translateY(-2px)">{{ ctaLabel }} →</button>
                <button onClick="{{ scrollToSafety }}" style="background:transparent;color:#FAF9F5;border:1px solid rgba(255,255,255,.34);padding:16px 24px;font-weight:700;font-size:14px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:border-color .15s,color .15s" style-hover="border-color:#D92624;color:#FFFFFF">L'essentiel sécurité</button>
              </div>
            </div>
            <div class="rb-hero-img" style="position:relative">
              <div style="position:absolute;left:-16px;top:20px;right:16px;bottom:-20px;border:1px solid rgba(255,255,255,.16)"></div>
              <div style="position:relative;background:#FAF9F5;border:1px solid rgba(255,255,255,.14);overflow:hidden;box-shadow:0 34px 80px -38px rgba(0,0,0,.95)">
                <div class="hz-stripe" style="height:8px"></div>
                <img src="img/eq-machine.png" alt="Le RodBot LP — mât replié sur le bac à tiges, porteur à chenilles" style="display:block;width:100%;height:auto;padding:12px 16px 0">
                <div style="display:flex;justify-content:space-between;gap:12px;padding:10px 16px 12px;font-weight:700;font-size:9.5px;letter-spacing:.14em;color:#535252">
                  <span>BORTERRA RODBOT LP · RENDU 3D</span>
                  <span>BAC 38×5"×6'</span>
                </div>
              </div>
            </div>
          </div>
          <div class="rb-reveal rb-d3" style="margin-top:38px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.12);padding:18px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap">
            <div style="font-weight:800;font-size:10px;letter-spacing:.2em;color:#989898;flex:none;line-height:1.6">FICHE<br>MACHINE</div>
            <div style="flex:1;min-width:0;display:grid;grid-template-columns:repeat(5,1fr);gap:20px">
              <div style="border-left:1px solid rgba(255,255,255,.18);padding-left:18px"><div style="color:#989898;font-size:12px;margin-bottom:5px">Système</div><div style="font-weight:700;font-size:13.5px;color:#FAF9F5">Borterra RodBot LP</div></div>
              <div style="border-left:1px solid rgba(255,255,255,.18);padding-left:18px"><div style="color:#989898;font-size:12px;margin-bottom:5px">Tâche / Client</div><div style="font-weight:700;font-size:13.5px;color:#FAF9F5">BM260024 · Machines Roger Intl</div></div>
              <div style="border-left:1px solid rgba(255,255,255,.18);padding-left:18px"><div style="color:#989898;font-size:12px;margin-bottom:5px">Commande</div><div style="font-weight:700;font-size:13.5px;color:#FAF9F5">Radio (RRC) · 6 modes</div></div>
              <div style="border-left:1px solid rgba(255,255,255,.18);padding-left:18px"><div style="color:#989898;font-size:12px;margin-bottom:5px">Arrêts d'urgence</div><div style="font-weight:700;font-size:13.5px;color:#FAF9F5">4 emplacements</div></div>
              <div style="border-left:1px solid rgba(255,255,255,.18);padding-left:18px"><div style="color:#989898;font-size:12px;margin-bottom:5px">Contenu</div><div style="font-weight:700;font-size:13.5px;color:#FAF9F5">{{ totalSections }} leçons · {{ totalModules }} modules</div></div>
            </div>
          </div>
        </div>
      </section>

      <!-- PARCOURS -->
      <section class="mr-ghost" data-ghost="Parcours" style="max-width:1180px;margin:0 auto;padding:54px 28px 24px">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap">
          <div>
            <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">01 — PARCOURS DE FORMATION</div>
            <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#1D1E1B">Les huit modules</h2>
          </div>
          <div style="font-size:14px;color:#535252;max-width:340px;text-align:right">Complétez chaque module et réussissez son quiz pour débloquer votre attestation.</div>
        </div>

        <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <sc-for list="{{ moduleCards }}" as="m" hint-placeholder-count="8">
            <button onClick="{{ m.open }}" style="text-align:left;background:#FFFFFF;border:1px solid rgba(29,30,27,.15);padding:0;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -24px rgba(20,20,19,.5);border-color:#1D1E1B">
              <div style="height:5px;background: {{ m.bar }}"></div>
              <div style="padding:20px 20px 18px;flex:1;display:flex;flex-direction:column">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">
                  <span style="font-weight:900;font-size:38px;line-height:.8;color:rgba(29,30,27,.14)">{{ m.num }}</span>
                  <span style="display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:9.5px;letter-spacing:.1em;padding:5px 10px;background: {{ m.statusBg }};color: {{ m.statusFg }}">{{ m.statusLabel }}</span>
                </div>
                <h3 style="font-weight:800;font-size:16.5px;line-height:1.2;text-transform:uppercase;margin:0 0 8px;color:#1D1E1B">{{ m.title }}</h3>
                <p style="font-size:13px;line-height:1.5;color:#535252;margin:0 0 16px;flex:1">{{ m.subtitle }}</p>
                <div style="display:flex;align-items:center;gap:12px;padding-top:12px;border-top:1px solid rgba(29,30,27,.12)">
                  <span style="font-weight:700;font-size:11px;letter-spacing:.04em;color:#989898">{{ m.sectionCount }} leçons</span>
                  <span style="font-weight:700;font-size:11px;letter-spacing:.04em;color:#D92624">p. {{ m.pages }}</span>
                </div>
              </div>
            </button>
          </sc-for>
        </div>
      </section>

      <!-- L'ÉQUIPEMENT EN UN COUP D'ŒIL -->
      <section class="mr-ghost mr-ghost-dark mr-grain" data-ghost="Machine" style="background:#141413;color:#FAF9F5;margin:46px 0 8px">
        <div style="max-width:1180px;margin:0 auto;padding:42px 28px 46px">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap">
            <div>
              <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#989898;margin-bottom:8px">L'ÉQUIPEMENT — EN UN COUP D'ŒIL</div>
              <h2 style="font-weight:900;font-size:24px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#FAF9F5">La machine, telle que vous la retrouverez</h2>
            </div>
            <div style="font-weight:700;font-size:10.5px;color:#8A8985;letter-spacing:.12em">FIGURES & ÉCRANS DU MANUEL</div>
          </div>
          <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
            <div class="rb-img-card" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);overflow:hidden">
              <div class="rb-img-frame" style="background:#FAF9F5;height:190px">
                <img src="img/eq-labeled.png" alt="Rendu annoté du bac à tiges — pattes de retenue latérales et fourreaux de fourches" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 42%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-weight:800;font-size:9.5px;letter-spacing:.16em;color:#E8534F;margin-bottom:6px">LE BAC À TIGES</div>
                <div style="font-size:12.5px;line-height:1.5;color:#B8B7B2">Plateau amovible de 35 tiges — pattes de retenue latérales et fourreaux de fourches pour la manutention.</div>
              </div>
            </div>
            <div class="rb-img-card" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);overflow:hidden">
              <div class="rb-img-frame" style="background:#FAF9F5;height:190px">
                <img src="img/eq-transport.png" alt="Position du mât pour le transport — bac plein et bac vide" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 60%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-weight:800;font-size:9.5px;letter-spacing:.16em;color:#E8534F;margin-bottom:6px">POSITION TRANSPORT</div>
                <div style="font-size:12.5px;line-height:1.5;color:#B8B7B2">Mât replié sur le bac, plein ou vide — la pose de déplacement qui garantit la stabilité de la machine.</div>
              </div>
            </div>
            <div class="rb-img-card" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);overflow:hidden">
              <div class="rb-img-frame" style="background:#FAF9F5;height:190px">
                <img src="img/eq-hmi.png" alt="Écran tactile IHM du RodBot — Direct Mode" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 30%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-weight:800;font-size:9.5px;letter-spacing:.16em;color:#E8534F;margin-bottom:6px">L'IHM EMBARQUÉE</div>
                <div style="font-size:12.5px;line-height:1.5;color:#B8B7B2">L'écran tactile du panneau — modes, diagnostics, alarmes et calibrage, couverts au module 05.</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ESSENTIEL SÉCURITÉ -->
      <section id="rb-safety" class="mr-ghost" data-ghost="Sécurité" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px;scroll-margin-top:80px">
        <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">02 — À CONNAÎTRE PAR CŒUR</div>
        <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 6px;color:#1D1E1B">L'essentiel sécurité</h2>
        <p style="font-size:15px;line-height:1.55;color:#535252;max-width:640px;margin:0 0 28px">Avant toute manœuvre, ces quatre réflexes doivent être automatiques.</p>

        <div style="display:grid;grid-template-columns:1.05fr .95fr;gap:18px;align-items:stretch">
          <div class="mr-grain" style="background:#141413;color:#FAF9F5;padding:24px;display:flex;flex-direction:column">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <span style="width:30px;height:30px;background:#D92624;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff">4</span>
              <span style="font-weight:800;font-size:16px;letter-spacing:.03em;text-transform:uppercase;color:#FAF9F5">Arrêts d'urgence <span style="color:#8A8985;font-weight:600;font-size:13px">· p. 12</span></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1">
              <sc-for list="{{ estops }}" as="e" hint-placeholder-count="4">
                <div style="border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);padding:12px 13px">
                  <div style="font-weight:800;font-size:9.5px;letter-spacing:.12em;color:#E8534F;margin-bottom:4px">{{ e.where }}</div>
                  <div style="font-size:12.5px;line-height:1.4;color:#C9C8C4">{{ e.detail }}</div>
                </div>
              </sc-for>
            </div>
            <div style="margin-top:14px;font-size:12.5px;line-height:1.5;color:#989898">Couplé à la foreuse mère : un arrêt d'urgence sur l'une déclenche l'arrêt des <strong style="color:#FAF9F5">deux machines</strong>.</div>
            <div class="mr-photo-dark" style="margin-top:14px;flex:1;min-height:150px;position:relative;border:1px solid rgba(255,255,255,.14);overflow:hidden">
              <img src="img/eq-panel.png" alt="Champignon d'arrêt d'urgence sur le panneau hydraulique du RodBot" style="position:absolute;inset:0;display:block;width:100%;height:100%;object-fit:cover;object-position:50% 12%">
              <div style="position:absolute;left:10px;bottom:9px;z-index:1;background:#141413;padding:4px 9px;font-weight:700;font-size:9px;letter-spacing:.14em;color:#FAF9F5">LE CHAMPIGNON DU PANNEAU — PHOTO</div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:18px">
            <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.14);padding:22px 24px">
              <div style="font-weight:800;font-size:15px;letter-spacing:.03em;text-transform:uppercase;margin-bottom:14px;color:#1D1E1B">Voyant ambre <span style="color:#989898;font-weight:600;font-size:13px">· p. 20</span></div>
              <div style="display:flex;flex-direction:column;gap:11px">
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;background:#F0A81E;flex:none;box-shadow:0 0 12px rgba(240,168,30,.75)"></span><span style="font-size:13.5px;color:#3A3B38"><strong>Fixe</strong> — commande À DISTANCE active</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;background:#F0A81E;flex:none;box-shadow:0 0 12px rgba(240,168,30,.75);animation:rbPulse 1.2s ease-in-out infinite"></span><span style="font-size:13.5px;color:#3A3B38"><strong>Clignotant</strong> — mât en TRAJECTOIRE ou déplacement en RALENTI</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;background:#D8D6D0;flex:none;border:1px solid rgba(29,30,27,.25)"></span><span style="font-size:13.5px;color:#3A3B38"><strong>Éteint</strong> — mode LOCAL</span></div>
              </div>
            </div>
            <div style="background:#D92624;color:#FFFFFF;padding:20px 22px;flex:1">
              <div style="font-weight:800;font-size:10px;letter-spacing:.16em;color:#FFFFFF;margin-bottom:6px">⚠ AUCUN SYSTÈME DE VISION · P. 63</div>
              <div style="font-size:13.5px;line-height:1.55;color:#FFE9E8">Le RodBot ne détecte <strong style="color:#FFFFFF">ni le personnel ni les équipements</strong> dans sa zone de travail. Une <strong style="color:#FFFFFF">barrière</strong> doit séparer l'opérateur de la machine et de la foreuse (p. 45) — pilotage radio de part et d'autre.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- SIMULATEURS -->
      <section class="mr-ghost" data-ghost="Pratique" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px">
        <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">03 — APPRENDRE EN MANIPULANT</div>
        <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 6px;color:#1D1E1B">Les simulateurs interactifs</h2>
        <p style="font-size:15px;line-height:1.55;color:#535252;max-width:640px;margin:0 0 28px">Explorez les composants réels de la machine — photos du manuel à l'appui — avant de poser les mains dessus.</p>
        <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <button onClick="{{ openSimRrc }}" style="text-align:left;background:#FFFFFF;color:#1D1E1B;border:1px solid rgba(29,30,27,.15);padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -24px rgba(20,20,19,.5);border-color:#D92624">
            <span style="font-weight:800;font-size:10px;letter-spacing:.18em;color:#989898">SIMULATEUR 1</span>
            <span style="font-weight:800;font-size:17.5px;line-height:1.2;text-transform:uppercase;color:#1D1E1B">La télécommande radio</span>
            <span style="font-size:13px;line-height:1.5;color:#535252">Photo réelle, zones cliquables : manettes, boutons, arrêt d'urgence à tester.</span>
            <span style="font-weight:800;font-size:13px;letter-spacing:.04em;color:#D92624;margin-top:auto">Explorer →</span>
          </button>
          <button onClick="{{ openSimMast }}" style="text-align:left;background:#FFFFFF;color:#1D1E1B;border:1px solid rgba(29,30,27,.15);padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -24px rgba(20,20,19,.5);border-color:#D92624">
            <span style="font-weight:800;font-size:10px;letter-spacing:.18em;color:#989898">SIMULATEUR 2</span>
            <span style="font-weight:800;font-size:17.5px;line-height:1.2;text-transform:uppercase;color:#1D1E1B">Le mât articulé J1–J6</span>
            <span style="font-size:13px;line-height:1.5;color:#535252">Pilotez chaque articulation aux curseurs et voyez le mât bouger en direct.</span>
            <span style="font-weight:800;font-size:13px;letter-spacing:.04em;color:#D92624;margin-top:auto">Manipuler →</span>
          </button>
          <button onClick="{{ openSimModes }}" style="text-align:left;background:#FFFFFF;color:#1D1E1B;border:1px solid rgba(29,30,27,.15);padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -24px rgba(20,20,19,.5);border-color:#D92624">

                  <span style="width:44px;height:44px;background: {{ beaconColor }};box-shadow: {{ beaconGlow }};animation: {{ beaconAnim }}"></span>
                </div>
                <div style="font-weight:700;font-size:9.5px;letter-spacing:.14em;color:#8A8985;margin-top:10px">VOYANT AMBRE</div>
              </div>
              <div style="flex:1">
                <div style="font-weight:900;font-size:22px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:4px;color:#FAF9F5">{{ simModeName }}</div>
                <div style="font-size:14px;line-height:1.55;color:#B8B7B2">{{ simModeDesc }}</div>
                <sc-if value="{{ klaxonOn }}" hint-placeholder-val="{{ false }}">
                  <div style="display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:#F0A81E;color:#141413;padding:6px 14px;font-weight:800;font-size:12px;animation:rbPulse .4s ease-in-out infinite">📣 KLAXON — changement de mode</div>
                </sc-if>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.15);padding:18px">
                <div style="font-weight:800;font-size:10px;letter-spacing:.12em;color:#989898;margin-bottom:8px">VALVE D'ISOLEMENT — CHENILLES & VÉRINS</div>
                <div style="display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color: {{ valveTracksFg }}"><span style="width:10px;height:10px;background: {{ valveTracksFg }}"></span>{{ valveTracks }}</div>
              </div>
              <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.15);padding:18px">
                <div style="font-weight:800;font-size:10px;letter-spacing:.12em;color:#989898;margin-bottom:8px">VALVE D'ISOLEMENT — MÂT & AUTRES</div>
                <div style="display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color: {{ valveMastFg }}"><span style="width:10px;height:10px;background: {{ valveMastFg }}"></span>{{ valveMast }}</div>
              </div>
            </div>

            <div style="background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:16px 18px;font-size:13px;line-height:1.55;color:#535252">Le klaxon retentit à chaque changement de mode (TRAM/MÂT) et les valves normalement fermées ne s'ouvrent que pour le mode sélectionné. Voyant : <strong style="color:#1D1E1B">fixe</strong> = à distance · <strong style="color:#1D1E1B">clignotant</strong> = trajectoire ou déplacement · <strong style="color:#1D1E1B">éteint</strong> = local. Manuel p. 16, 20 et 50.</div>
          </div>
        </div>
      </section>
      </sc-if>

      <div style="height:30px"></div>
    </div>
    </sc-if>

    <!-- ============ MODULE ============ -->
    <sc-if value="{{ isModule }}" hint-placeholder-val="{{ false }}">
    <div style="animation:rbFade .35s ease both">
      <div class="mr-ghost mr-ghost-dark mr-grain" data-ghost="Module" style="background:#141413;color:#FAF9F5">
        <div style="max-width:960px;margin:0 auto;padding:26px 28px 34px;position:relative;z-index:1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
            <button onClick="{{ goHome }}" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#989898;font-weight:700;font-size:11px;letter-spacing:.1em;cursor:pointer;padding:0" style-hover="color:#FAF9F5">← TOUS LES MODULES</button>
            <a href="{{ mod.pdfHref }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;letter-spacing:.08em;color:#FAF9F5" style-hover="color:#E8534F">MANUEL p. {{ mod.pages }} ↗</a>
          </div>
          <div style="display:flex;align-items:flex-start;gap:20px">
            <span style="font-weight:900;font-size:64px;line-height:.8;color:rgba(250,249,245,.16)">{{ mod.num }}</span>
            <div style="flex:1">
              <div style="display:inline-block;background:#D92624;color:#FFFFFF;font-weight:800;font-size:10px;letter-spacing:.16em;padding:4px 10px;margin-bottom:10px">MODULE {{ mod.num }} / {{ totalModules }} · CHAPITRES {{ mod.chapters }}</div>
              <h1 style="font-weight:900;font-size:32px;line-height:1.15;letter-spacing:.005em;text-transform:uppercase;margin:0 0 10px;color:#FAF9F5">{{ mod.title }}</h1>
              <p style="font-size:15.5px;line-height:1.55;color:#B8B7B2;max-width:640px;margin:0">{{ mod.intro }}</p>
            </div>
          </div>
        </div>
      </div>

      <section style="max-width:960px;margin:0 auto;padding:32px 28px 20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <div style="font-weight:800;font-size:11px;letter-spacing:.16em;color:#989898">LEÇONS — CLIQUEZ POUR DÉPLIER</div>
          <div style="font-weight:700;font-size:11px;letter-spacing:.04em;color:#989898">{{ mod.sectionCount }} leçons</div>
        </div>

        <div style="display:flex;flex-direction:column;gap:12px">
          <sc-for list="{{ mod.sections }}" as="s" hint-placeholder-count="6">
            <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.14);overflow:hidden;border-left:5px solid {{ s.accent }}">
              <button onClick="{{ s.toggle }}" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:17px 20px;display:flex;align-items:center;gap:16px">
                <span style="font-weight:700;font-size:12px;color:#989898;min-width:34px">{{ s.ref }}</span>
                <span style="flex:1;font-weight:700;font-size:16px;line-height:1.25;color:#1D1E1B">{{ s.title }}</span>
                <span style="font-weight:700;font-size:10.5px;letter-spacing:.04em;color:#D92624;white-space:nowrap">p. {{ s.page }}</span>
                <span style="font-size:18px;color:#989898;transition:transform .2s;transform: {{ s.chevron }}">⌄</span>
              </button>

              <sc-if value="{{ s.open }}" hint-placeholder-val="{{ false }}">
              <div style="padding:2px 20px 20px 20px;animation:rbFade .25s ease both">
                <div style="border-top:1px solid rgba(29,30,27,.12);padding-top:16px;display:flex;flex-direction:column;gap:14px">

                  <sc-for list="{{ s.blocks }}" as="b" hint-placeholder-count="3">
                    <div style="display:contents">
                      <sc-if value="{{ b.isP }}" hint-placeholder-val="{{ false }}">
                        <p style="margin:0;font-size:14px;line-height:1.6;color:#3A3B38">{{ b.text }}</p>
                      </sc-if>
                      <sc-if value="{{ b.isUl }}" hint-placeholder-val="{{ false }}">
                        <ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px">
                          <sc-for list="{{ b.items }}" as="it" hint-placeholder-count="3">
                            <li style="display:flex;gap:9px;font-size:13.5px;line-height:1.5;color:#3A3B38"><span style="color:#D92624;font-weight:800;flex:none">›</span><span>{{ it }}</span></li>
                          </sc-for>
                        </ul>
                      </sc-if>
                      <sc-if value="{{ b.isSteps }}" hint-placeholder-val="{{ false }}">
                        <ol style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px">
                          <sc-for list="{{ b.steps }}" as="st" hint-placeholder-count="3">
                            <li style="display:flex;gap:11px;font-size:13.5px;line-height:1.5;color:#3A3B38;align-items:flex-start">
                              <span style="width:22px;height:22px;background:#1D1E1B;color:#FFFFFF;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px">{{ st.n }}</span>
                              <span style="padding-top:2px">{{ st.text }}</span>
                            </li>
                          </sc-for>
                        </ol>
                      </sc-if>
                      <sc-if value="{{ b.isSpecs }}" hint-placeholder-val="{{ false }}">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                          <sc-for list="{{ b.rows }}" as="r" hint-placeholder-count="4">
                            <div style="display:flex;justify-content:space-between;gap:12px;align-items:baseline;background:#F4F3EE;border:1px solid rgba(29,30,27,.1);padding:10px 14px">
                              <span style="font-size:12.5px;color:#535252">{{ r.k }}</span>
                              <span style="font-weight:700;font-size:13px;text-align:right;color:#1D1E1B">{{ r.v }}</span>
                            </div>
                          </sc-for>
                        </div>
                      </sc-if>
                      <sc-if value="{{ b.isWarn }}" hint-placeholder-val="{{ false }}">
                        <div style="padding:14px 16px;border:1px solid {{ b.wBorder }};border-left:6px solid {{ b.wSolid }};background: {{ b.wBg }}">
                          <div style="font-weight:800;font-size:9.5px;letter-spacing:.14em;color: {{ b.wFg }};margin-bottom:5px">{{ b.wLabel }}</div>
                          <div style="font-size:13.5px;line-height:1.55;color:#2A2B28">{{ b.text }}</div>
                        </div>
                      </sc-if>
                      <sc-if value="{{ b.isImg }}" hint-placeholder-val="{{ false }}">
                        <figure style="margin:2px 0;border:1px solid rgba(29,30,27,.18);background:#FFFFFF">
                          <div style="background:#F4F1EA;border-bottom:1px solid rgba(29,30,27,.12);padding:8px">
                            <img src="{{ b.src }}" loading="lazy" alt="Figure du manuel — page {{ b.imgPage }}" style="display:block;width:100%;height:auto">
                          </div>
                          <figcaption style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px">
                            <span style="font-size:12.5px;line-height:1.4;color:#535252">{{ b.cap }}</span>
                            <a href="{{ b.imgHref }}" target="_blank" rel="noopener" style="flex:none;font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#D92624;text-decoration:none;white-space:nowrap">Manuel p. {{ b.imgPage }} ↗</a>
                          </figcaption>
                        </figure>
                      </sc-if>
                    </div>
                  </sc-for>

                  <div style="display:flex;justify-content:flex-end">
                    <a href="{{ s.pdfHref }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:11px;letter-spacing:.04em;color:#D92624;border:1px solid rgba(217,38,36,.4);padding:7px 12px;transition:background .15s" style-hover="background:rgba(217,38,36,.07)">
                      <span style="font-weight:800;font-size:9.5px;background:#D92624;color:#FFFFFF;padding:2px 5px">PDF</span>
                      Voir dans le manuel — p. {{ s.page }} ↗
                    </a>
                  </div>
                </div>
              </div>
              </sc-if>
            </div>
          </sc-for>
        </div>

        <!-- ===== PLANCHES DU MANUEL (captures d'écran) ===== -->
        <div class="mr-ghost" data-ghost="MANUEL" style="margin-top:40px;position:relative">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px">
            <div>
              <span style="display:inline-block;background:#D92624;color:#FFFFFF;padding:5px 10px;font-weight:800;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">Planches du manuel</span>
              <h3 style="font-weight:900;font-size:24px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#1D1E1B">Le manuel, page par page</h3>
            </div>
            <div style="font-size:12.5px;color:#535252;max-width:340px;text-align:right">{{ mod.manualCount }} pages du manuel officiel · cliquez une page pour l'ouvrir en PDF ↗</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
            <sc-for list="{{ mod.manualPages }}" as="pg" hint-placeholder-count="6">
              <a href="{{ pg.href }}" target="_blank" rel="noopener" class="mr-plate" style="display:block;background:#FFFFFF;border:1px solid rgba(29,30,27,.18);text-decoration:none;transition:transform .15s,box-shadow .15s,border-color .15s" style-hover="transform:translateY(-3px);box-shadow:0 16px 34px -22px rgba(20,20,19,.7);border-color:#D92624">
                <div style="position:relative;background:#F4F1EA;border-bottom:1px solid rgba(29,30,27,.12);aspect-ratio:17/22;overflow:hidden">
                  <img src="{{ pg.src }}" loading="lazy" alt="Manuel page {{ pg.n }}" style="display:block;width:100%;height:100%;object-fit:cover;object-position:top center">
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px">
                  <span style="font-weight:800;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#535252">Page {{ pg.n }}</span>
                  <span style="font-weight:900;font-size:12px;color:#D92624">↗</span>
                </div>
              </a>
            </sc-for>
          </div>
        </div>

        <div style="margin-top:30px;background:#FFFFFF;border:1px solid rgba(29,30,27,.15);box-shadow:0 20px 44px -30px rgba(20,20,19,.5);padding:28px 26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;color:#1D1E1B">
          <div style="flex:1;min-width:220px">
            <div style="font-weight:800;font-size:19px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:4px;color:#1D1E1B">Valider ce module</div>
            <div style="font-size:14px;color:#535252">{{ mod.quizLen }} questions · {{ passPct }}% requis pour réussir</div>
          </div>
          <sc-if value="{{ mod.done }}" hint-placeholder-val="{{ false }}">
            <span style="display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:#2F7D48;background:rgba(62,156,90,.12);padding:12px 18px">✓ Module validé — {{ mod.score }}%</span>
          </sc-if>
          <button onClick="{{ startQuiz }}" style="background:#D92624;color:#FFFFFF;border:none;padding:14px 26px;font-weight:800;font-size:14px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:background .15s,transform .15s" style-hover="background:#B71F1D;transform:translateY(-2px)">{{ mod.quizCta }} →</button>
        </div>
      </section>
      <div style="height:56px"></div>
    </div>
    </sc-if>

    <!-- ============ QUIZ ============ -->
    <sc-if value="{{ isQuiz }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:720px;margin:0 auto;padding:32px 28px 70px;animation:rbFade .35s ease both">
      <button onClick="{{ backToModule }}" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#989898;font-weight:700;font-size:11px;letter-spacing:.1em;cursor:pointer;padding:0;margin-bottom:20px" style-hover="color:#1D1E1B">← RETOUR AU MODULE</button>

      <sc-if value="{{ quizGraded }}" hint-placeholder-val="{{ false }}">
        <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.15);padding:36px 30px;text-align:center">
          <div style="width:78px;height:78px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;background: {{ result.ringBg }};color: {{ result.ringFg }}">{{ result.scorePct }}%</div>
          <h2 style="font-weight:900;font-size:24px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 8px;color:#1D1E1B">{{ result.title }}</h2>
          <p style="font-size:15px;line-height:1.55;color:#535252;max-width:440px;margin:0 auto 26px">{{ result.message }}</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button onClick="{{ retryQuiz }}" style="background:transparent;border:1px solid rgba(29,30,27,.3);color:#1D1E1B;padding:13px 22px;font-weight:700;font-size:14px;cursor:pointer">Recommencer</button>
            <button onClick="{{ result.nextAction }}" style="background:#D92624;color:#FFFFFF;border:none;padding:13px 24px;font-weight:800;font-size:14px;cursor:pointer">{{ result.nextLabel }} →</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ quizActive }}" hint-placeholder-val="{{ true }}">
        <div style="margin-bottom:6px;font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624">QUIZ · MODULE {{ mod.num }}</div>
        <h1 style="font-weight:900;font-size:26px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 26px;color:#1D1E1B">{{ mod.title }}</h1>
        <div style="display:flex;flex-direction:column;gap:20px">
          <sc-for list="{{ quizItems }}" as="q" hint-placeholder-count="4">
            <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.14);padding:22px 22px 20px">
              <div style="display:flex;gap:12px;margin-bottom:16px">
                <span style="font-weight:800;font-size:14px;color:#D92624;min-width:26px">Q{{ q.n }}</span>
                <span style="font-weight:700;font-size:16px;line-height:1.35;color:#1D1E1B">{{ q.text }}</span>
              </div>
              <div style="display:flex;flex-direction:column;gap:9px;padding-left:38px">
                <sc-for list="{{ q.options }}" as="o" hint-placeholder-count="3">
                  <button onClick="{{ o.pick }}" style="text-align:left;background: {{ o.bg }};border:1.5px solid {{ o.border }};padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s">
                    <span style="width:22px;height:22px;border:2px solid {{ o.dot }};flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color: {{ o.dotFg }};background: {{ o.dotBg }}">{{ o.letter }}</span>
                    <span style="font-size:14.5px;line-height:1.4;color:#2A2B28">{{ o.text }}</span>
                  </button>
                </sc-for>
              </div>
            </div>
          </sc-for>
        </div>
        <button onClick="{{ submitQuiz }}" style="margin-top:24px;width:100%;background: {{ submitBg }};color: {{ submitFg }};border:none;padding:16px;font-weight:800;font-size:15px;letter-spacing:.04em;text-transform:uppercase;cursor: {{ submitCursor }};transition:background .15s">{{ submitLabel }}</button>
      </sc-if>
    </div>
    </sc-if>

    <!-- ============ ATTESTATION ============ -->
    <sc-if value="{{ isCert }}" hint-placeholder-val="{{ false }}">
    <div class="mr-ghost" data-ghost="Attestation" style="max-width:820px;margin:0 auto;padding:44px 28px 70px;animation:rbFade .4s ease both">
      <div style="text-align:center;margin-bottom:26px">
        <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">PARCOURS COMPLÉTÉ</div>
        <h1 style="font-weight:900;font-size:32px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#1D1E1B">Attestation de formation</h1>
      </div>

      <div style="position:relative;background:#FFFFFF;color:#1D1E1B;border:1px solid rgba(29,30,27,.16);overflow:hidden;box-shadow:0 40px 90px -50px rgba(20,20,19,.6)">
        <div class="hz-stripe" style="height:12px"></div>
        <div style="padding:44px 44px 38px;text-align:center">
          <div style="font-weight:800;font-size:11px;letter-spacing:.3em;color:#989898;margin-bottom:12px">CERTIFICAT DE RÉUSSITE</div>
          <p style="font-size:15px;color:#535252;margin:0 0 6px">Ce document atteste que</p>
          <input value="{{ traineeName }}" onInput="{{ setName }}" placeholder="Votre nom" style="font-weight:900;font-size:30px;text-align:center;border:none;border-bottom:2px solid rgba(29,30,27,.3);background:transparent;color:#1D1E1B;padding:6px 10px;margin:6px 0 18px;max-width:100%;outline:none">
          <p style="font-size:15px;line-height:1.6;color:#3A3B38;max-width:520px;margin:0 auto 26px">a suivi et validé avec succès la formation d'opérateur du <strong style="color:#1D1E1B">système robotisé Borterra RodBot LP</strong>, couvrant les {{ totalModules }} modules et {{ totalSections }} leçons issus du manuel de l'opérateur OM 10667.</p>

          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 0 28px">
            <sc-for list="{{ certModules }}" as="cm" hint-placeholder-count="8">
              <div style="border:1px solid rgba(29,30,27,.14);background:#FAF9F5;padding:11px 8px">
                <div style="font-weight:700;font-size:9.5px;letter-spacing:.08em;color:#989898;margin-bottom:3px">MODULE {{ cm.num }}</div>
                <div style="font-weight:700;font-size:12px;line-height:1.2;color:#1D1E1B;margin-bottom:5px">{{ cm.short }}</div>
                <div style="font-weight:800;font-size:13px;color:#2F7D48">{{ cm.score }}%</div>
              </div>
            </sc-for>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(29,30,27,.16);padding-top:18px;flex-wrap:wrap;gap:14px">
            <div style="text-align:left">
              <div style="font-weight:700;font-size:10px;color:#989898;letter-spacing:.1em">DATE DE DÉLIVRANCE</div>
              <div style="font-weight:700;font-size:14px;color:#1D1E1B">{{ certDate }}</div>
            </div>
            <div style="text-align:left">
              <div style="font-weight:700;font-size:10px;color:#989898;letter-spacing:.1em">RÉFÉRENCE</div>
              <div style="font-weight:700;font-size:14px;color:#1D1E1B">OM 10667 · R0 · BM260024</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;font-size:10px;color:#989898;letter-spacing:.1em">SCORE GLOBAL</div>
              <div style="font-weight:900;font-size:20px;color:#D92624">{{ overallScore }}%</div>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align:center;margin-top:24px">
        <button onClick="{{ goHome }}" style="background:#141413;color:#FAF9F5;border:none;padding:13px 26px;font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background .15s" style-hover="background:#D92624">Retour à l'accueil</button>
      </div>
    </div>
    </sc-if>

  </main>
</div>
</script>

<script src="app.js"></script>
</body>
</html>
