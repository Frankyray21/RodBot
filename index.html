<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formation opérateur, RodBot LP</title>
<meta name="description" content="Formation a l exploitation du systeme robotise Borterra RodBot LP, basee sur le manuel de l operateur OM 10667.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="img/hero-machine-photo.webp?v=1.8.11" type="image/webp">
<link rel="stylesheet" href="styles.css?v=1.8.15">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#141413">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RodBot LP">
<link rel="apple-touch-icon" href="icon-192.png?v=1.9.18">
<link rel="icon" type="image/png" href="icon-192.png?v=1.9.18">
</head>
<body>
<div id="app"></div>

<!-- Gabarit declaratif d origine (interprete par app.js). Ne pas executer comme HTML. -->
<script type="text/html" id="rb-template">
<div style="min-height:100vh;display:flex;flex-direction:column">

  <!-- ============ BARRE SUPÉRIEURE ============ -->
  <header class="rb-topbar" style="position:sticky;top:0;z-index:50;background:rgba(20,20,19,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#FAF9F5;border-bottom:1px solid rgba(255,255,255,.1)">
    <div class="rb-topbar-inner" style="max-width:1180px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;gap:18px">
      <button class="rb-brand" onClick="{{ goHome }}" style="display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;padding:0">
        <span style="text-align:left;line-height:1">
          <span style="display:flex;align-items:center;gap:8px">
            <span class="rb-brand-title" style="font-weight:900;font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:#FAF9F5">RODBOT LP</span>
            <span class="rb-beta-tag" style="font-weight:800;font-size:8.5px;letter-spacing:.14em;color:#1D1E1B;background:#F0A81E;padding:2px 6px">BÊTA</span>
          </span>
          <span class="rb-brand-subtitle" style="display:block;font-weight:700;font-size:9.5px;letter-spacing:.26em;color:#989898;margin-top:3px">FORMATION OPÉRATEUR</span>
        </span>
      </button>
      <div style="flex:1;display:flex;align-items:center;gap:10px;min-width:0">
        <sc-if value="{{ traineeName }}" hint-placeholder-val="{{ false }}">
          <span class="rb-worker-badge" title="{{ workerBadgeTitle }}" style="display:inline-flex;align-items:center;gap:6px;max-width:100%;overflow:hidden;font-weight:700;font-size:11.5px;color:#B8B7B2;letter-spacing:.01em">
            <span aria-hidden="true" style="flex:none;font-size:11px;line-height:1;color: {{ workerDotBg }}">{{ workerDotGlyph }}</span>
            <span class="sr-only">{{ workerBadgeTitle }}</span>
            <span class="rb-worker-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ traineeName }}</span>
          </span>
        </sc-if>
        <sc-if value="{{ showClearIdentity }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ clearIdentity }}" style="flex:none;background:none;border:none;padding:0;font-weight:700;font-size:10.5px;color:#6E6D69;letter-spacing:.02em;cursor:pointer;text-decoration:underline;text-underline-offset:2px" style-hover="color:#B8B7B2">{{ clearIdentityLabel }}</button>
        </sc-if>
      </div>
      <div class="rb-lang-switch" style="display:flex;flex:none;border:1px solid rgba(255,255,255,.24)">
        <button onClick="{{ setLangFr }}" title="Français" style="{{ langFrStyle }}border:none;padding:7px 11px;font-weight:800;font-size:11px;letter-spacing:.06em;cursor:pointer;font-family:inherit">FR</button>
        <button onClick="{{ setLangEn }}" title="English" style="{{ langEnStyle }}border:none;padding:7px 11px;font-weight:800;font-size:11px;letter-spacing:.06em;cursor:pointer;font-family:inherit">EN</button>
      </div>
      <a class="rb-manual-link" href="{{ manualUrl }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.24);padding:8px 13px;font-weight:700;font-size:10.5px;letter-spacing:.12em;color:#FAF9F5;transition:border-color .15s,color .15s" style-hover="border-color:#D92624;color:#FFFFFF">
        <span style="font-weight:800;font-size:10px;background:#D92624;color:#FFFFFF;padding:2px 6px">PDF</span>
        MANUEL ↗
      </a>
      <div class="rb-hdr-prog" style="display:flex;align-items:center;gap:14px">
        <div class="rb-hdr-bar" style="width:120px;height:8px;background:rgba(255,255,255,.16);overflow:hidden">
          <div style="height:100%;background:#D92624;transition:width .5s cubic-bezier(.4,0,.2,1);width: {{ progressPct }}%"></div>
        </div>
        <span style="font-weight:800;font-size:14px;color:#FAF9F5;min-width:38px;text-align:right">{{ progressPct }}%</span>
      </div>
    </div>
  </header>

  <!-- Bannière discrète (6 s) : confirme une restauration de progression -->
  <sc-if value="{{ showProgRestored }}" hint-placeholder-val="{{ false }}">
    <div role="status" style="background:rgba(62,156,90,.1);border-bottom:1px solid rgba(62,156,90,.28);padding:8px 28px;text-align:center;font-weight:700;font-size:12.5px;color:#2F7D48">✓ {{ progRestoredMsg }}</div>
  </sc-if>

  <nav class="rb-side-toc" aria-label="Table des matières">
    <div class="rb-toc-kicker">TABLE DES MATIÈRES</div>
    <div class="rb-toc-now" aria-live="polite">
      <span class="rb-toc-now-label" data-rb-toc-now-label>{{ tocNowLabel }}</span>
      <strong class="rb-toc-now-title" data-rb-toc-now-title>{{ tocNowTitle }}</strong>
    </div>
    <sc-if value="{{ tocHomeMode }}" hint-placeholder-val="true">
      <div class="rb-toc-list rb-toc-section-list">
        <sc-for list="{{ homeToc }}" as="s" hint-placeholder-count="6">
          <button class="rb-toc-section-item {{ s.activeClass }}" data-rb-toc-key="{{ s.key }}" data-rb-toc-title="{{ s.title }}" aria-current="{{ s.ariaCurrent }}" onClick="{{ s.open }}">
            <span class="rb-toc-section-num">{{ s.num }}</span>
            <span class="rb-toc-section-title">{{ s.title }}</span>
          </button>
        </sc-for>
      </div>
    </sc-if>
    <sc-if value="{{ tocModuleMode }}" hint-placeholder-val="false">
      <button class="rb-toc-home" onClick="{{ goHome }}">ACCUEIL</button>
      <div class="rb-toc-list">
        <sc-for list="{{ moduleCards }}" as="m" hint-placeholder-count="8">
          <button class="rb-toc-item" data-rb-toc-module="{{ m.index }}" aria-current="{{ m.tocAriaCurrent }}" onClick="{{ m.open }}" title="{{ m.title }}" style="background:{{ m.tocBg }};border-color:{{ m.tocBorder }};color:{{ m.tocFg }}">
            <span class="rb-toc-num" style="background:{{ m.tocNumBg }};color:{{ m.tocNumFg }}">{{ m.num }}</span>
            <span class="rb-toc-copy">
              <span class="rb-toc-title">{{ m.short }}</span>
              <span class="rb-toc-status">{{ m.tocStatus }}</span>
            </span>
          </button>
        </sc-for>
      </div>
    </sc-if>
  </nav>

  <main style="flex:1">

    <!-- ============ ACCUEIL ============ -->
    <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <div style="animation:rbFade .4s ease both">

      <!-- HERO -->
      <section class="mr-ghost mr-ghost-dark mr-grain" data-ghost="RodBot" data-rb-scroll-section="overview" style="position:relative;background:#141413;color:#FAF9F5;overflow:hidden">
        <div style="position:absolute;inset:0;opacity:.5;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(180deg,rgba(0,0,0,.85),transparent 86%);-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.85),transparent 86%)"></div>

        <div class="rb-hero-bg" aria-hidden="true">
          <video autoplay muted loop playsinline preload="metadata" poster="3d/assets/previews/hero_poster.jpg">
            <source src="3d/assets/videos/hero_rodbot.mp4" type="video/mp4">
            <source src="3d/assets/videos/hero_rodbot.webm" type="video/webm">
          </video>
          <div class="rb-hero-bg-scrim"></div>
        </div>
        <div class="rb-hero-inner" style="max-width:1180px;margin:0 auto;padding:46px 28px 44px;position:relative;z-index:2">
          <div class="rb-hero-grid">
            <div class="rb-hero-stage rb-reveal">
              <div class="rb-hero-badges" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px">
                <div class="rb-hero-manual-badge" style="display:inline-flex;align-items:center;gap:10px;background:#D92624;padding:7px 14px">
                  <span style="width:7px;height:7px;background:#FFFFFF;animation:rbPulse 2s ease-in-out infinite"></span>
                  <span style="font-weight:800;font-size:10.5px;letter-spacing:.16em;color:#FFFFFF">MANUEL DE L'OPÉRATEUR · OM 10667 · R0</span>
                </div>
                <span class="rb-version-badge" style="display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);padding:6px 12px;font-weight:800;font-size:10.5px;letter-spacing:.14em;color:#B8B7B2">VERSION {{ appVersion }}</span>
              </div>
              <h1 style="font-weight:900;font-size:54px;line-height:1.12;letter-spacing:.005em;text-transform:uppercase;margin:0 0 22px;color:#FAF9F5">Utiliser le<br><span style="color:#D92624">RodBot LP</span></h1>
              <div class="rb-hero-copy rb-hero-chips" style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px">
                <span style="display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);padding:9px 14px;font-weight:700;font-size:12.5px;color:#E5E4E0">📚 8 modules courts</span>
                <span style="display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);padding:9px 14px;font-weight:700;font-size:12.5px;color:#E5E4E0">✅ Quiz après chaque module</span>
                <span style="display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);padding:9px 14px;font-weight:700;font-size:12.5px;color:#E5E4E0">🎓 Attestation au registre</span>
              </div>
              <sc-if value="{{ heroProg.show }}" hint-placeholder-val="{{ false }}">
              <div style="margin:0 0 22px;max-width:420px">
                <div style="display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:11.5px;letter-spacing:.06em;color:#B8B7B2;margin-bottom:7px"><span>{{ heroProg.label }}</span><span>{{ heroProg.pct }} %</span></div>
                <div style="height:5px;background:rgba(255,255,255,.14)"><div style="height:100%;background:#D92624;width: {{ heroProg.pct }}%"></div></div>
              </div>
              </sc-if>
              <div class="rb-hero-actions" style="display:flex;gap:14px;flex-wrap:wrap">
                <button class="rb-hero-cta" onClick="{{ startFirst }}" style="background:#D92624;color:#FFFFFF;border:none;padding:16px 28px;font-weight:800;font-size:14px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:transform .15s,background .15s" style-hover="background:#B71F1D;transform:translateY(-2px)">{{ ctaLabel }} →</button>
                <button class="rb-hero-secondary" onClick="{{ scrollToSafety }}" style="background:transparent;color:#FAF9F5;border:1px solid rgba(255,255,255,.34);padding:16px 24px;font-weight:700;font-size:14px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:border-color .15s,color .15s" style-hover="border-color:#D92624;color:#FFFFFF">Voir la sécurité</button>
                <a class="rb-hero-secondary" href="3d/" style="display:inline-flex;align-items:center;gap:8px;background:transparent;color:#FAF9F5;border:1px solid rgba(255,255,255,.34);padding:16px 24px;font-weight:700;font-size:14px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s" style-hover="border-color:#D92624;color:#FFFFFF">🧊 Explorer la machine en 3D</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- INSTALLER L'APP (PWA) : bandeau discret -->
      <sc-if value="{{ showInstall }}" hint-placeholder-val="{{ true }}">
      <div style="background:#F4F3EE;border-bottom:1px solid rgba(29,30,27,.1)">
        <div style="max-width:1180px;margin:0 auto;padding:9px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:15px;flex:none">📲</span>
          <span style="flex:1;min-width:180px;font-size:12.5px;color:#535252;line-height:1.4">Installez l'app pour un accès <strong style="color:#1D1E1B">hors-ligne</strong> sur tablette ou téléphone.</span>
          <button onClick="{{ installApp }}" style="flex:none;background:none;border:none;padding:2px 0;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:#D92624;cursor:pointer;white-space:nowrap" style-hover="color:#B71F1D">Installer ↓</button>
        </div>
      </div>
      </sc-if>

      <!-- PARCOURS -->
      <section class="mr-ghost" data-ghost="Parcours" data-rb-scroll-section="path" style="max-width:1180px;margin:0 auto;padding:54px 28px 24px">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap">
          <div>
            <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">01 : PARCOURS DE FORMATION</div>
            <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#1D1E1B">8 étapes de formation</h2>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
            <div style="font-size:14px;color:#535252;max-width:380px;text-align:right">Ouvrir un module. Faire les gestes. Répondre au petit quiz.</div>
            <button id="rb-tour-suivi" onClick="{{ openSuivi }}" style="background:transparent;border:1px solid rgba(29,30,27,.3);color:#1D1E1B;padding:9px 16px;font-weight:800;font-size:11.5px;letter-spacing:.08em;cursor:pointer;transition:border-color .15s" style-hover="border-color:#D92624">📋 MON SUIVI</button>
          </div>
        </div>

        <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <sc-for list="{{ moduleCards }}" as="m" hint-placeholder-count="8">
            <button onClick="{{ m.open }}" style="text-align:left;background:#FFFFFF;border:1px solid rgba(29,30,27,.15);padding:0;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -24px rgba(20,20,19,.5);border-color:#1D1E1B">
              <div style="height:5px;background: {{ m.bar }}"></div>
              <div style="padding:20px 20px 18px;flex:1;display:flex;flex-direction:column">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">
                  <span style="font-weight:900;font-size:38px;line-height:.8;color:rgba(29,30,27,.14)">{{ m.num }}</span>
                  <span style="display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:9.5px;letter-spacing:.1em;padding:5px 10px;background: {{ m.statusBg }};color: {{ m.statusFg }}">{{ m.statusLabel }}</span>
                </div>
                <h3 style="font-weight:800;font-size:16.5px;line-height:1.2;text-transform:uppercase;margin:0 0 8px;color:#1D1E1B">{{ m.title }}</h3>
                <p style="font-size:13px;line-height:1.5;color:#535252;margin:0 0 16px;flex:1">{{ m.subtitle }}</p>
                <div style="display:flex;align-items:center;gap:12px;padding-top:12px;border-top:1px solid rgba(29,30,27,.12)">
                  <span style="font-weight:700;font-size:11px;letter-spacing:.04em;color:#989898">{{ m.sectionCount }} leçons</span>
                  <span style="font-weight:700;font-size:11px;letter-spacing:.04em;color:#D92624">p. {{ m.pages }}</span>
                </div>
              </div>
            </button>
          </sc-for>
        </div>
      </section>

      <!-- L'ÉQUIPEMENT EN UN COUP D'ŒIL -->
      <section class="mr-ghost mr-ghost-dark mr-grain" data-ghost="Machine" data-rb-scroll-section="equipment" style="background:#141413;color:#FAF9F5;margin:46px 0 8px">
        <div style="max-width:1180px;margin:0 auto;padding:42px 28px 46px">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap">
            <div>
              <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#989898;margin-bottom:8px">L'ÉQUIPEMENT : EN UN COUP D'ŒIL</div>
              <h2 style="font-weight:900;font-size:24px;letter-spacing:.01em;text-transform:uppercase;margin:0;color:#FAF9F5">Trouver les pièces sur la machine</h2>
            </div>
            <div style="font-weight:700;font-size:10.5px;color:#8A8985;letter-spacing:.12em">FIGURES & ÉCRANS DU MANUEL</div>
          </div>
          <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
            <sc-for list="{{ equip }}" as="q" hint-placeholder-count="6">
              <button onClick="{{ q.open }}" class="rb-img-card" style="text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);overflow:hidden;cursor:pointer;padding:0;display:block;width:100%;color:inherit;font:inherit" style-hover="border-color:rgba(217,38,36,.55)">
                <div class="rb-img-frame" style="background:#FAF9F5;height:190px;position:relative">
                  <img src="{{ q.src }}" alt="{{ q.tag }}" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position: {{ q.pos }}">
                  <span style="position:absolute;right:8px;bottom:8px;background:rgba(20,20,19,.82);color:#FFFFFF;font-size:9px;font-weight:800;letter-spacing:.1em;padding:3px 7px">🔍 AGRANDIR</span>
                </div>
                <div style="padding:15px 17px 16px">
                  <div style="font-weight:800;font-size:9.5px;letter-spacing:.16em;color:#E8534F;margin-bottom:6px">{{ q.tag }}</div>
                  <div style="font-size:12.5px;line-height:1.5;color:#B8B7B2">{{ q.desc }}</div>
                </div>
              </button>
            </sc-for>
          </div>
        </div>
      </section>

      <!-- MAT ARTICULE : figure du manuel (deplacee des simulateurs) -->
      <section class="mr-ghost" data-ghost="Mât" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px">
        <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">LE MÂT ARTICULÉ</div>
        <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 24px;color:#1D1E1B">Chaque mouvement, du pivot au grappin</h2>
        <div style="background:#FFFFFF;border:1px solid rgba(29,30,27,.15);overflow:hidden;display:flex;flex-direction:column">
          <div style="padding:16px 22px 13px;border-bottom:1px solid rgba(29,30,27,.12);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">
            <div style="font-weight:800;font-size:10px;letter-spacing:.16em;color:#989898">FIGURE DU MANUEL</div>
            <span style="font-weight:700;font-size:10px;letter-spacing:.12em;color:#D92624;border:1px solid rgba(217,38,36,.4);padding:5px 10px;white-space:nowrap">MANUEL · P. 13</span>
          </div>
          <div style="background:#fff;padding:24px 28px 12px"><img src="img/mat-annote.png" alt="Figure annotée du mât articulé : pivotement, articulation (épaule), télescope, joint rotatif (poignet), rotation, inclinaison, grappin" loading="lazy" style="display:block;width:100%;max-width:530px;margin:0 auto;height:auto"></div>
          <div style="padding:14px 22px 18px;border-top:1px solid rgba(29,30,27,.12);display:flex;flex-wrap:wrap;gap:7px;align-items:center"><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">PIVOTEMENT</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">ARTICULATION (ÉPAULE)</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">TÉLESCOPE</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">POIGNET</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">ROTATION</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">INCLINAISON</span><span style="font-weight:700;font-size:9.5px;letter-spacing:.1em;color:#535252;background:#EFEEE9;border:1px solid rgba(29,30,27,.1);padding:5px 11px">GRAPPIN</span></div>
        </div>
      </section>

      <!-- ESSENTIEL SÉCURITÉ -->
      <section id="rb-safety" class="mr-ghost" data-ghost="Sécurité" data-rb-scroll-section="safety" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px;scroll-margin-top:80px">
        <div style="font-weight:800;font-size:11px;letter-spacing:.2em;color:#D92624;margin-bottom:8px">02 : AVANT DE BOUGER</div>
        <h2 style="font-weight:900;font-size:30px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 6px;color:#1D1E1B">Savoir arrêter la machine</h2>

        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:15px"><sc-for list="{{ rrcSelLines }}" as="ln" hint-placeholder-count="2"><div sc-html="{{ ln }}" style="font-size:14.5px;line-height:1.5;color:#3A3B38"></div></sc-for></div>
        <button onClick="{{ rrcSelOpen }}" style="display:inline-flex;align-items:center;gap:8px;background:none;font-weight:700;font-size:12px;letter-spacing:.04em;color:#D92624;border:1px solid rgba(217,38,36,.4);padding:9px 14px;cursor:pointer"><span style="font-weight:800;font-size:13px">📖</span>View manual page {{ rrcSelPage }}</button>
      </div>
    </div>
    </sc-if>

    <sc-if value="{{ imgView }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeImg }}" style="position:fixed;inset:0;z-index:220;background:rgba(20,20,19,.82);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:16px;animation:rbFade .18s ease both">
      <div onClick="{{ stopEvt }}" style="width:min(1120px,100%);max-height:94vh;display:flex;flex-direction:column;background:#141413;border:1px solid rgba(255,255,255,.14);box-shadow:0 46px 100px -28px rgba(0,0,0,.9);animation:rbPop .22s cubic-bezier(.2,.9,.3,1.15) both">
        <div style="flex:none;display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:3px solid #D92624;border-bottom:1px solid rgba(255,255,255,.12)">
          <span style="font-size:17px;flex:none">🔍</span>
          <span style="font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#FAF9F5">{{ imgView.cap }}</span>
          <div style="flex:1"></div>
          <button onClick="{{ closeImg }}" title="Close and return to the page" style="flex:none;background:#D92624;color:#FFFFFF;border:none;width:38px;height:38px;font-size:18px;font-weight:800;cursor:pointer" style-hover="background:#B71F1D">✕</button>
        </div>
        <div style="flex:1;min-height:0;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:14px;background:#0D0D0C">
          <img src="{{ imgView.src }}" alt="{{ imgView.cap }}" style="max-width:100%;width:auto;height:auto;background:#FFFFFF;box-shadow:0 20px 60px -22px rgba(0,0,0,.9)">
        </div>
      </div>
    </div>
    </sc-if>

    <!-- ============ INSTALL HELP ============ -->
    <sc-if value="{{ showInstallHelp }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;inset:0;z-index:210;background:rgba(20,20,19,.92);display:flex;align-items:center;justify-content:center;padding:20px;animation:rbFade .2s ease both">
      <div style="background:#FAF9F5;max-width:460px;width:100%;border-top:5px solid #D92624">
        <div style="display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid rgba(29,30,27,.12)">
          <span style="font-size:22px">📲</span>
          <span style="font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:.02em;color:#1D1E1B;flex:1">Install the app</span>
          <button onClick="{{ closeInstallHelp }}" style="background:#1D1E1B;color:#FFFFFF;border:none;width:32px;height:32px;font-size:16px;font-weight:800;cursor:pointer">✕</button>
        </div>
        <div style="padding:20px 22px;font-size:14px;line-height:1.55;color:#2A2B28">
          <sc-if value="{{ isIOS }}" hint-placeholder-val="{{ false }}">
            <div style="font-weight:800;margin-bottom:8px;color:#1D1E1B">On iPhone / iPad (Safari):</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <div>1. Tap the <strong>Share</strong> icon ⬆️ at the bottom of Safari.</div>
              <div>2. Choose <strong>"Add to Home Screen"</strong>.</div>
              <div>3. Tap <strong>Add</strong>, the app appears on the home screen.</div>
            </div>
          </sc-if>
          <div style="margin-top:14px">
            <div style="font-weight:800;margin-bottom:8px;color:#1D1E1B">On Android / computer (Chrome, Edge):</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <div>1. Open the browser <strong>⋮</strong> menu.</div>
              <div>2. Choose <strong>"Install app"</strong> (or "Add to Home Screen").</div>
            </div>
          </div>
          <div style="margin-top:16px;background:rgba(55,99,168,.09);border-left:5px solid #3763A8;padding:12px 14px;font-size:13px;color:#2F4F83">ℹ️ Once installed, the training works <strong>offline</strong>.</div>
        </div>
      </div>
    </div>
    </sc-if>

  </main>
</div>
</script>

<script src="app.js?v=1.9.43"></script>
<script type="module" src="3d/js/hero-embed.js"></script>
</body>
</html>
