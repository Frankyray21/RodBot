<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formation opérateur — RodBot LP</title>
<meta name="description" content="Formation à l exploitation du systeme robotise Borterra RodBot LP, basee sur le manuel de l operateur OM 10667.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<!-- Gabarit declaratif d origine (interprete par app.js). Ne pas executer comme HTML. -->
<script type="text/html" id="rb-template">
<div style="min-height:100vh;display:flex;flex-direction:column">

  <!-- ============ BARRE SUPÉRIEURE ============ -->
  <header style="position:sticky;top:0;z-index:50;background:#17150e;color:#f4f2ea;border-bottom:3px solid #e8a33a">
    <div style="max-width:1180px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;gap:18px">
      <button onClick="{{ goHome }}" style="display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;padding:0">
        <span style="width:34px;height:34px;border:2px solid #e8a33a;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:18px;color:#e8a33a">R</span>
        <span style="text-align:left;line-height:1">
          <span style="display:block;font-family:'Archivo';font-weight:800;font-size:15px;letter-spacing:.02em;color:#f4f2ea">RODBOT LP</span>
          <span style="display:block;font-family:'IBM Plex Mono';font-size:9.5px;letter-spacing:.18em;color:#a49a80;margin-top:2px">FORMATION OPÉRATEUR</span>
        </span>
      </button>
      <div style="flex:1"></div>
      <a href="{{ manualUrl }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:8px 13px;font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:.08em;color:#f4f2ea;transition:border-color .15s,color .15s" style-hover="border-color:#e8a33a;color:#e8a33a">
        <span style="font-family:'Archivo';font-weight:800;font-size:10px;background:#e8a33a;color:#17150e;border-radius:3px;padding:2px 5px">PDF</span>
        MANUEL ↗
      </a>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:120px;height:8px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden">
          <div style="height:100%;background:#e8a33a;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width: {{ progressPct }}%"></div>
        </div>
        <span style="font-family:'Archivo';font-weight:800;font-size:14px;color:#e8a33a;min-width:38px;text-align:right">{{ progressPct }}%</span>
      </div>
    </div>
  </header>

  <main style="flex:1">

    <!-- ============ ACCUEIL ============ -->
    <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <div style="animation:rbFade .4s ease both">

      <!-- HERO -->
      <section style="position:relative;background:#17150e;color:#f4f2ea;overflow:hidden">
        <div style="position:absolute;inset:0;opacity:.10;background-image:radial-gradient(circle at 1px 1px,#f4f2ea 1px,transparent 0);background-size:26px 26px"></div>
        <div style="max-width:1180px;margin:0 auto;padding:60px 28px 52px;position:relative;display:grid;grid-template-columns:1.35fr .9fr;gap:48px;align-items:center">
          <div>
            <div style="display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(232,163,58,.4);border-radius:99px;padding:6px 14px;margin-bottom:24px">
              <span style="width:7px;height:7px;border-radius:50%;background:#e8a33a;animation:rbPulse 2s ease-in-out infinite"></span>
              <span style="font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:.14em;color:#d8cdb4">MANUEL DE L'OPÉRATEUR · OM 10667 · R0</span>
            </div>
            <h1 style="font-family:'Archivo';font-weight:900;font-size:54px;line-height:.98;letter-spacing:-.02em;margin:0 0 20px">Maîtriser le<br><span style="color:#e8a33a">RodBot LP</span></h1>
            <p style="font-size:17.5px;line-height:1.55;color:#c9c0aa;max-width:530px;margin:0 0 30px">Formation complète à l'exploitation du système robotisé de manutention de tiges de forage — bâtie sur l'intégralité du manuel de l'opérateur. Chaque leçon renvoie à la page exacte du document.</p>
            <div style="display:flex;gap:14px;flex-wrap:wrap">
              <button onClick="{{ startFirst }}" style="background:#e8a33a;color:#17150e;border:none;border-radius:8px;padding:15px 26px;font-family:'Archivo';font-weight:800;font-size:15px;cursor:pointer;transition:transform .15s,background .15s" style-hover="background:#f0b64a;transform:translateY(-2px)">{{ ctaLabel }} →</button>
              <button onClick="{{ scrollToSafety }}" style="background:transparent;color:#f4f2ea;border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:15px 24px;font-family:'Archivo';font-weight:700;font-size:15px;cursor:pointer;transition:border-color .15s" style-hover="border-color:#e8a33a">L'essentiel sécurité</button>
            </div>
          </div>
          <div style="position:relative">
            <div class="hz-stripe" style="height:12px;border-radius:6px 6px 0 0"></div>
            <div style="background:#211e15;border:1px solid rgba(255,255,255,.1);border-top:none;padding:24px;border-radius:0 0 10px 10px">
              <div style="font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.16em;color:#8f866f;margin-bottom:16px">FICHE MACHINE</div>
              <div style="display:flex;flex-direction:column;gap:14px">
                <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed rgba(255,255,255,.14);padding-bottom:11px"><span style="color:#c9c0aa;font-size:13.5px">Système</span><span style="font-family:'Archivo';font-weight:700;font-size:13.5px">Borterra RodBot LP</span></div>
                <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed rgba(255,255,255,.14);padding-bottom:11px"><span style="color:#c9c0aa;font-size:13.5px">Tâche / Client</span><span style="font-family:'Archivo';font-weight:700;font-size:13.5px">BM260024 · Machines Roger Intl</span></div>
                <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed rgba(255,255,255,.14);padding-bottom:11px"><span style="color:#c9c0aa;font-size:13.5px">Commande</span><span style="font-family:'Archivo';font-weight:700;font-size:13.5px">Radio (RRC) · 6 modes</span></div>
                <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed rgba(255,255,255,.14);padding-bottom:11px"><span style="color:#c9c0aa;font-size:13.5px">Arrêts d'urgence</span><span style="font-family:'Archivo';font-weight:700;font-size:13.5px">4 emplacements</span></div>
                <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:#c9c0aa;font-size:13.5px">Contenu</span><span style="font-family:'Archivo';font-weight:700;font-size:13.5px">{{ totalSections }} leçons · {{ totalModules }} modules</span></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- PARCOURS -->
      <section style="max-width:1180px;margin:0 auto;padding:54px 28px 24px">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap">
          <div>
            <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;color:#9a8f74;margin-bottom:8px">01 — PARCOURS DE FORMATION</div>
            <h2 style="font-family:'Archivo';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0">Les huit modules</h2>
          </div>
          <div style="font-size:14px;color:#5c5645;max-width:340px;text-align:right">Complétez chaque module et réussissez son quiz pour débloquer votre attestation.</div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <sc-for list="{{ moduleCards }}" as="m" hint-placeholder-count="8">
            <button onClick="{{ m.open }}" style="text-align:left;background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:12px;padding:0;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column" style-hover="transform:translateY(-4px);box-shadow:0 14px 34px -18px rgba(23,21,14,.5);border-color:rgba(23,21,14,.28)">
              <div style="height:6px;background: {{ m.bar }}"></div>
              <div style="padding:20px 20px 18px;flex:1;display:flex;flex-direction:column">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">
                  <span style="font-family:'Archivo';font-weight:900;font-size:38px;line-height:.8;color:#dcd6c6">{{ m.num }}</span>
                  <span style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.08em;padding:5px 10px;border-radius:99px;background: {{ m.statusBg }};color: {{ m.statusFg }}">{{ m.statusLabel }}</span>
                </div>
                <h3 style="font-family:'Archivo';font-weight:700;font-size:18px;line-height:1.15;margin:0 0 8px">{{ m.title }}</h3>
                <p style="font-size:13px;line-height:1.5;color:#6a6350;margin:0 0 16px;flex:1">{{ m.subtitle }}</p>
                <div style="display:flex;align-items:center;gap:12px;padding-top:12px;border-top:1px solid rgba(23,21,14,.1)">
                  <span style="font-family:'IBM Plex Mono';font-size:11px;color:#6a6350">{{ m.sectionCount }} leçons</span>
                  <span style="font-family:'IBM Plex Mono';font-size:11px;color:#b5641b">p. {{ m.pages }}</span>
                </div>
              </div>
            </button>
          </sc-for>
        </div>
      </section>

      <!-- ESSENTIEL SÉCURITÉ -->
      <section id="rb-safety" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px;scroll-margin-top:80px">
        <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;color:#9a8f74;margin-bottom:8px">02 — À CONNAÎTRE PAR CŒUR</div>
        <h2 style="font-family:'Archivo';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0 0 6px">L'essentiel sécurité</h2>
        <p style="font-size:15px;line-height:1.55;color:#5c5645;max-width:640px;margin:0 0 28px">Avant toute manœuvre, ces quatre réflexes doivent être automatiques.</p>

        <div style="display:grid;grid-template-columns:1.05fr .95fr;gap:18px;align-items:stretch">
          <div style="background:#17150e;color:#f4f2ea;border-radius:14px;padding:24px;display:flex;flex-direction:column">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <span style="width:30px;height:30px;border-radius:50%;background:#c33a29;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:13px;color:#fff">4</span>
              <span style="font-family:'Archivo';font-weight:800;font-size:17px">Arrêts d'urgence <span style="color:#8f866f;font-weight:600;font-size:13px">· p. 12</span></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1">
              <sc-for list="{{ estops }}" as="e" hint-placeholder-count="4">
                <div style="border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:12px 13px">
                  <div style="font-family:'IBM Plex Mono';font-size:9.5px;letter-spacing:.1em;color:#e8a33a;margin-bottom:4px">{{ e.where }}</div>
                  <div style="font-size:12.5px;line-height:1.4;color:#d8cdb4">{{ e.detail }}</div>
                </div>
              </sc-for>
            </div>
            <div style="margin-top:14px;font-size:12.5px;line-height:1.5;color:#a49a80">Couplé à la foreuse mère : un arrêt d'urgence sur l'une déclenche l'arrêt des <strong style="color:#d8cdb4">deux machines</strong>.</div>
          </div>

          <div style="display:flex;flex-direction:column;gap:18px">
            <div style="background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:14px;padding:22px 24px">
              <div style="font-family:'Archivo';font-weight:800;font-size:16px;margin-bottom:14px">Voyant ambre <span style="color:#9a8f74;font-weight:600;font-size:13px">· p. 20</span></div>
              <div style="display:flex;flex-direction:column;gap:11px">
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#e8a33a;flex:none;box-shadow:0 0 10px rgba(232,163,58,.7)"></span><span style="font-size:13.5px"><strong>Fixe</strong> — commande À DISTANCE active</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#e8a33a;flex:none;animation:rbPulse 1.2s ease-in-out infinite"></span><span style="font-size:13.5px"><strong>Clignotant</strong> — mât en TRAJECTOIRE ou déplacement en RALENTI</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#4a4536;flex:none;border:1px solid rgba(23,21,14,.25)"></span><span style="font-size:13.5px"><strong>Éteint</strong> — mode LOCAL</span></div>
              </div>
            </div>
            <div style="background:#f9e3de;border:1px solid rgba(195,58,41,.35);border-left:5px solid #c33a29;border-radius:12px;padding:18px 20px;flex:1">
              <div style="font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.12em;color:#a5321f;margin-bottom:6px">⚠ AUCUN SYSTÈME DE VISION · P. 63</div>
              <div style="font-size:13.5px;line-height:1.55;color:#3a3529">Le RodBot ne détecte <strong>ni le personnel ni les équipements</strong> dans sa zone de travail. Une <strong>barrière</strong> doit séparer l'opérateur de la machine et de la foreuse (p. 45) — pilotage radio de part et d'autre.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- SIMULATEURS -->
      <section style="max-width:1180px;margin:0 auto;padding:44px 28px 10px">
        <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;color:#9a8f74;margin-bottom:8px">03 — APPRENDRE EN MANIPULANT</div>
        <h2 style="font-family:'Archivo';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0 0 6px">Les simulateurs interactifs</h2>
        <p style="font-size:15px;line-height:1.55;color:#5c5645;max-width:640px;margin:0 0 28px">Explorez les composants réels de la machine — photos du manuel à l'appui — avant de poser les mains dessus.</p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <button onClick="{{ openSimRrc }}" style="text-align:left;background:#17150e;color:#f4f2ea;border:none;border-radius:12px;padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 14px 34px -18px rgba(23,21,14,.7)">
            <span style="font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;color:#e8a33a">SIMULATEUR 1</span>
            <span style="font-family:'Archivo';font-weight:800;font-size:19px;line-height:1.15">La télécommande radio</span>
            <span style="font-size:13px;line-height:1.5;color:#a49a80">Photo réelle, zones cliquables : manettes, boutons, arrêt d'urgence à tester.</span>
            <span style="font-family:'Archivo';font-weight:700;font-size:13px;color:#e8a33a;margin-top:auto">Explorer →</span>
          </button>
          <button onClick="{{ openSimMast }}" style="text-align:left;background:#17150e;color:#f4f2ea;border:none;border-radius:12px;padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 14px 34px -18px rgba(23,21,14,.7)">
            <span style="font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;color:#e8a33a">SIMULATEUR 2</span>
            <span style="font-family:'Archivo';font-weight:800;font-size:19px;line-height:1.15">Le mât articulé J1–J6</span>
            <span style="font-size:13px;line-height:1.5;color:#a49a80">Pilotez chaque articulation aux curseurs et voyez le mât bouger en direct.</span>
            <span style="font-family:'Archivo';font-weight:700;font-size:13px;color:#e8a33a;margin-top:auto">Manipuler →</span>
          </button>
          <button onClick="{{ openSimModes }}" style="text-align:left;background:#17150e;color:#f4f2ea;border:none;border-radius:12px;padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:10px" style-hover="transform:translateY(-4px);box-shadow:0 14px 34px -18px rgba(23,21,14,.7)">
            <span style="font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;color:#e8a33a">SIMULATEUR 3</span>
            <span style="font-family:'Archivo';font-weight:800;font-size:19px;line-height:1.15">Modes & voyant ambre</span>
            <span style="font-size:13px;line-height:1.5;color:#a49a80">Changez de mode et observez le voyant, le klaxon et les valves d'isolement.</span>
            <span style="font-family:'Archivo';font-weight:700;font-size:13px;color:#e8a33a;margin-top:auto">Tester →</span>
          </button>
        </div>
      </section>

      <!-- DOCUMENTS -->
      <section style="max-width:1180px;margin:0 auto;padding:44px 28px 24px">
        <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;color:#9a8f74;margin-bottom:8px">04 — DOCUMENTS DE RÉFÉRENCE</div>
        <h2 style="font-family:'Archivo';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0 0 24px">Toujours à portée de main</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
          <a href="{{ manualUrl }}" target="_blank" rel="noopener" style="display:flex;gap:18px;align-items:flex-start;background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:12px;padding:22px;color:#17150e;transition:transform .18s,box-shadow .18s" style-hover="transform:translateY(-3px);box-shadow:0 14px 34px -18px rgba(23,21,14,.5)">
            <span style="width:46px;height:56px;flex:none;background:#17150e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#e8a33a;border-bottom:4px solid #e8a33a">PDF</span>
            <span>
              <span style="display:block;font-family:'Archivo';font-weight:800;font-size:17px;margin-bottom:4px">Manuel de l'opérateur ↗</span>
              <span style="display:block;font-family:'IBM Plex Mono';font-size:10.5px;color:#9a8f74;margin-bottom:8px">OM 10667 · R0 · 87 PAGES · 07 JUIL. 2026</span>
              <span style="display:block;font-size:13.5px;line-height:1.5;color:#5c5645">Le document de référence complet — chaque leçon de ce site pointe vers sa page exacte.</span>
            </span>
          </a>
          <a href="{{ raUrl }}" target="_blank" rel="noopener" style="display:flex;gap:18px;align-items:flex-start;background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:12px;padding:22px;color:#17150e;transition:transform .18s,box-shadow .18s" style-hover="transform:translateY(-3px);box-shadow:0 14px 34px -18px rgba(23,21,14,.5)">
            <span style="width:46px;height:56px;flex:none;background:#5c5645;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#f4f2ea;border-bottom:4px solid #9a8f74">PDF</span>
            <span>
              <span style="display:block;font-family:'Archivo';font-weight:800;font-size:17px;margin-bottom:4px">Évaluation des risques ↗</span>
              <span style="display:block;font-family:'IBM Plex Mono';font-size:10.5px;color:#9a8f74;margin-bottom:8px">BM260024 · RÉV. 01 · ISO 12100 · 4 PAGES</span>
              <span style="display:block;font-size:13.5px;line-height:1.5;color:#5c5645">Document complémentaire — l'analyse des dangers et mesures de réduction du RodBot.</span>
            </span>
          </a>
        </div>
      </section>

      <footer style="max-width:1180px;margin:0 auto;padding:32px 28px 60px">
        <div style="border-top:1px solid rgba(23,21,14,.14);padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-family:'IBM Plex Mono';font-size:11px;color:#8f866f;letter-spacing:.03em">
          <span>BM260024 · MANUEL DE L'OPÉRATEUR OM 10667 R0 · BORTERRA RODBOT LP</span>
          <span>ASSISTANCE : SERVICE@MEDATECH.CA · +1 (705) 443-8440 #4</span>
        </div>
      </footer>
    </div>
    </sc-if>

    <!-- ============ SIMULATEURS ============ -->
    <sc-if value="{{ isSim }}" hint-placeholder-val="{{ false }}">
    <div style="animation:rbFade .35s ease both">
      <div style="background:#17150e;color:#f4f2ea">
        <div style="max-width:1180px;margin:0 auto;padding:24px 28px 0">
          <button onClick="{{ goHome }}" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#c9c0aa;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.08em;cursor:pointer;padding:0;margin-bottom:18px" style-hover="color:#f4f2ea">← RETOUR À L'ACCUEIL</button>
          <h1 style="font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-.01em;margin:0 0 20px">Simulateurs interactifs</h1>
          <div style="display:flex;gap:6px">
            <button onClick="{{ openSimRrc }}" style="border:none;border-radius:8px 8px 0 0;padding:12px 20px;font-family:'Archivo';font-weight:700;font-size:14px;cursor:pointer;background: {{ tabRrcBg }};color: {{ tabRrcFg }}">Télécommande</button>
            <button onClick="{{ openSimMast }}" style="border:none;border-radius:8px 8px 0 0;padding:12px 20px;font-family:'Archivo';font-weight:700;font-size:14px;cursor:pointer;background: {{ tabMastBg }};color: {{ tabMastFg }}">Mât J1–J6</button>

                      <sc-if value="{{ b.isSpecs }}" hint-placeholder-val="{{ false }}">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                          <sc-for list="{{ b.rows }}" as="r" hint-placeholder-count="4">
                            <div style="display:flex;justify-content:space-between;gap:12px;align-items:baseline;background:#f1eee4;border-radius:8px;padding:10px 14px">
                              <span style="font-size:12.5px;color:#6a6350">{{ r.k }}</span>
                              <span style="font-family:'Archivo';font-weight:700;font-size:13px;text-align:right">{{ r.v }}</span>
                            </div>
                          </sc-for>
                        </div>
                      </sc-if>
                      <sc-if value="{{ b.isWarn }}" hint-placeholder-val="{{ false }}">
                        <div style="border-radius:10px;padding:14px 16px;border:1px solid {{ b.wBorder }};border-left:5px solid {{ b.wSolid }};background: {{ b.wBg }}">
                          <div style="font-family:'IBM Plex Mono';font-size:9.5px;letter-spacing:.12em;color: {{ b.wFg }};margin-bottom:5px">{{ b.wLabel }}</div>
                          <div style="font-size:13.5px;line-height:1.55;color:#3a3529">{{ b.text }}</div>
                        </div>
                      </sc-if>
                    </div>
                  </sc-for>

                  <div style="display:flex;justify-content:flex-end">
                    <a href="{{ s.pdfHref }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.04em;color:#b5641b;border:1px solid rgba(181,100,27,.35);border-radius:7px;padding:7px 12px;transition:background .15s" style-hover="background:rgba(232,163,58,.12)">
                      <span style="font-family:'Archivo';font-weight:800;font-size:9.5px;background:#b5641b;color:#fbfaf5;border-radius:3px;padding:2px 5px">PDF</span>
                      Voir dans le manuel — p. {{ s.page }} ↗
                    </a>
                  </div>
                </div>
              </div>
              </sc-if>
            </div>
          </sc-for>
        </div>

        <div style="margin-top:30px;background:#17150e;border-radius:14px;padding:28px 26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;color:#f4f2ea">
          <div style="flex:1;min-width:220px">
            <div style="font-family:'Archivo';font-weight:800;font-size:20px;margin-bottom:4px">Valider ce module</div>
            <div style="font-size:14px;color:#c9c0aa">{{ mod.quizLen }} questions · {{ passPct }}% requis pour réussir</div>
          </div>
          <sc-if value="{{ mod.done }}" hint-placeholder-val="{{ false }}">
            <span style="display:inline-flex;align-items:center;gap:9px;font-family:'Archivo';font-weight:700;font-size:14px;color:#79c48f;background:rgba(121,196,143,.14);padding:12px 18px;border-radius:8px">✓ Module validé — {{ mod.score }}%</span>
          </sc-if>
          <button onClick="{{ startQuiz }}" style="background:#e8a33a;color:#17150e;border:none;border-radius:8px;padding:14px 26px;font-family:'Archivo';font-weight:800;font-size:15px;cursor:pointer;transition:background .15s,transform .15s" style-hover="background:#f0b64a;transform:translateY(-2px)">{{ mod.quizCta }} →</button>
        </div>
      </section>
      <div style="height:56px"></div>
    </div>
    </sc-if>

    <!-- ============ QUIZ ============ -->
    <sc-if value="{{ isQuiz }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:720px;margin:0 auto;padding:32px 28px 70px;animation:rbFade .35s ease both">
      <button onClick="{{ backToModule }}" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#7a7360;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.08em;cursor:pointer;padding:0;margin-bottom:20px" style-hover="color:#17150e">← RETOUR AU MODULE</button>

      <sc-if value="{{ quizGraded }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:16px;padding:36px 30px;text-align:center">
          <div style="width:78px;height:78px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:26px;background: {{ result.ringBg }};color: {{ result.ringFg }}">{{ result.scorePct }}%</div>
          <h2 style="font-family:'Archivo';font-weight:800;font-size:26px;margin:0 0 8px">{{ result.title }}</h2>
          <p style="font-size:15px;line-height:1.55;color:#5c5645;max-width:440px;margin:0 auto 26px">{{ result.message }}</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button onClick="{{ retryQuiz }}" style="background:#fff;border:1px solid rgba(23,21,14,.2);border-radius:8px;padding:13px 22px;font-family:'Archivo';font-weight:700;font-size:14px;cursor:pointer">Recommencer</button>
            <button onClick="{{ result.nextAction }}" style="background:#17150e;color:#f4f2ea;border:none;border-radius:8px;padding:13px 24px;font-family:'Archivo';font-weight:800;font-size:14px;cursor:pointer">{{ result.nextLabel }} →</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ quizActive }}" hint-placeholder-val="{{ true }}">
        <div style="margin-bottom:6px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.14em;color:#9a8f74">QUIZ · MODULE {{ mod.num }}</div>
        <h1 style="font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-.01em;margin:0 0 26px">{{ mod.title }}</h1>
        <div style="display:flex;flex-direction:column;gap:20px">
          <sc-for list="{{ quizItems }}" as="q" hint-placeholder-count="4">
            <div style="background:#fbfaf5;border:1px solid rgba(23,21,14,.13);border-radius:14px;padding:22px 22px 20px">
              <div style="display:flex;gap:12px;margin-bottom:16px">
                <span style="font-family:'Archivo';font-weight:900;font-size:14px;color:#e8a33a;min-width:26px">Q{{ q.n }}</span>
                <span style="font-family:'Archivo';font-weight:700;font-size:16.5px;line-height:1.35">{{ q.text }}</span>
              </div>
              <div style="display:flex;flex-direction:column;gap:9px;padding-left:38px">
                <sc-for list="{{ q.options }}" as="o" hint-placeholder-count="3">
                  <button onClick="{{ o.pick }}" style="text-align:left;background: {{ o.bg }};border:1.5px solid {{ o.border }};border-radius:9px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s;font-family:'Public Sans'">
                    <span style="width:22px;height:22px;border-radius:50%;border:2px solid {{ o.dot }};flex:none;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color: {{ o.dotFg }};background: {{ o.dotBg }}">{{ o.letter }}</span>
                    <span style="font-size:14.5px;line-height:1.4;color:#2a2619">{{ o.text }}</span>
                  </button>
                </sc-for>
              </div>
            </div>
          </sc-for>
        </div>
        <button onClick="{{ submitQuiz }}" style="margin-top:24px;width:100%;background: {{ submitBg }};color: {{ submitFg }};border:none;border-radius:10px;padding:16px;font-family:'Archivo';font-weight:800;font-size:16px;cursor: {{ submitCursor }};transition:background .15s">{{ submitLabel }}</button>
      </sc-if>
    </div>
    </sc-if>

    <!-- ============ ATTESTATION ============ -->
    <sc-if value="{{ isCert }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:820px;margin:0 auto;padding:44px 28px 70px;animation:rbFade .4s ease both">
      <div style="text-align:center;margin-bottom:26px">
        <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;color:#9a8f74;margin-bottom:8px">PARCOURS COMPLÉTÉ</div>
        <h1 style="font-family:'Archivo';font-weight:900;font-size:34px;letter-spacing:-.01em;margin:0">Attestation de formation</h1>
      </div>

      <div style="position:relative;background:#fbfaf5;border:2px solid #17150e;border-radius:6px;overflow:hidden">
        <div class="hz-stripe" style="height:14px"></div>
        <div style="padding:42px 44px 38px;text-align:center">
          <div style="width:52px;height:52px;border:2px solid #e8a33a;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:26px;color:#b5641b">R</div>
          <div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.18em;color:#9a8f74;margin-bottom:10px">CERTIFICAT DE RÉUSSITE</div>
          <p style="font-size:15px;color:#5c5645;margin:0 0 6px">Ce document atteste que</p>
          <input value="{{ traineeName }}" onInput="{{ setName }}" placeholder="Votre nom" style="font-family:'Archivo';font-weight:800;font-size:30px;text-align:center;border:none;border-bottom:2px dashed rgba(23,21,14,.3);background:transparent;color:#17150e;padding:6px 10px;margin:6px 0 18px;max-width:100%;outline:none">
          <p style="font-size:15px;line-height:1.6;color:#3a3529;max-width:520px;margin:0 auto 26px">a suivi et validé avec succès la formation d'opérateur du <strong>système robotisé Borterra RodBot LP</strong>, couvrant les {{ totalModules }} modules et {{ totalSections }} leçons issus du manuel de l'opérateur OM 10667.</p>

          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 0 28px">
            <sc-for list="{{ certModules }}" as="cm" hint-placeholder-count="8">
              <div style="border:1px solid rgba(23,21,14,.14);border-radius:8px;padding:11px 8px">
                <div style="font-family:'IBM Plex Mono';font-size:9.5px;color:#9a8f74;margin-bottom:3px">MODULE {{ cm.num }}</div>
                <div style="font-family:'Archivo';font-weight:700;font-size:12px;line-height:1.2;color:#17150e;margin-bottom:5px">{{ cm.short }}</div>
                <div style="font-family:'Archivo';font-weight:800;font-size:13px;color:#4a9c68">{{ cm.score }}%</div>
              </div>
            </sc-for>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(23,21,14,.16);padding-top:18px;flex-wrap:wrap;gap:14px">
            <div style="text-align:left">
              <div style="font-family:'IBM Plex Mono';font-size:10px;color:#9a8f74;letter-spacing:.08em">DATE DE DÉLIVRANCE</div>
              <div style="font-family:'Archivo';font-weight:700;font-size:14px">{{ certDate }}</div>
            </div>
            <div style="text-align:left">
              <div style="font-family:'IBM Plex Mono';font-size:10px;color:#9a8f74;letter-spacing:.08em">RÉFÉRENCE</div>
              <div style="font-family:'Archivo';font-weight:700;font-size:14px">OM 10667 · R0 · BM260024</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'IBM Plex Mono';font-size:10px;color:#9a8f74;letter-spacing:.08em">SCORE GLOBAL</div>
              <div style="font-family:'Archivo';font-weight:900;font-size:20px;color:#b5641b">{{ overallScore }}%</div>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align:center;margin-top:24px">
        <button onClick="{{ goHome }}" style="background:#17150e;color:#f4f2ea;border:none;border-radius:8px;padding:13px 26px;font-family:'Archivo';font-weight:800;font-size:14px;cursor:pointer">Retour à l'accueil</button>
      </div>
    </div>
    </sc-if>

  </main>
</div>
</script>

<script src="app.js"></script>
</body>
</html>
