<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formation opérateur — RodBot LP</title>
<meta name="description" content="Formation a l exploitation du systeme robotise Borterra RodBot LP, basee sur le manuel de l operateur OM 10667.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<!-- Gabarit declaratif d origine (interprete par app.js). Ne pas executer comme HTML. -->
<script type="text/html" id="rb-template">
<div style="min-height:100vh;display:flex;flex-direction:column">

  <!-- ============ BARRE SUPÉRIEURE ============ -->
  <header style="position:sticky;top:0;z-index:50;background:rgba(10,14,21,.84);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);color:#F1F5FB;border-bottom:1px solid rgba(151,180,220,.14)">
    <div style="max-width:1180px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;gap:18px">
      <button onClick="{{ goHome }}" style="display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;padding:0">
        <span style="width:34px;height:34px;border:1px solid rgba(69,216,232,.55);border-radius:9px;background:linear-gradient(160deg,rgba(69,216,232,.18),rgba(69,216,232,.02));box-shadow:0 0 18px -4px rgba(69,216,232,.5);display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:17px;color:#7BE7F2">R</span>
        <span style="text-align:left;line-height:1">
          <span style="display:block;font-family:'Sora';font-weight:800;font-size:15px;letter-spacing:.02em;color:#F1F5FB">RODBOT LP</span>
          <span style="display:block;font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.18em;color:#66788F;margin-top:2px">FORMATION OPÉRATEUR</span>
        </span>
      </button>
      <div style="flex:1"></div>
      <a href="{{ manualUrl }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(151,180,220,.25);border-radius:7px;padding:8px 13px;font-family:'Spline Sans Mono';font-size:10.5px;letter-spacing:.08em;color:#E7EDF5;transition:border-color .15s,color .15s" style-hover="border-color:rgba(69,216,232,.6);color:#7BE7F2">
        <span style="font-family:'Sora';font-weight:800;font-size:10px;background:#45D8E8;color:#06222A;border-radius:3px;padding:2px 5px">PDF</span>
        MANUEL ↗
      </a>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:120px;height:8px;background:rgba(151,180,220,.16);border-radius:99px;overflow:hidden">
          <div style="height:100%;background:linear-gradient(90deg,#0B7C90,#45D8E8);box-shadow:0 0 10px rgba(69,216,232,.65);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width: {{ progressPct }}%"></div>
        </div>
        <span style="font-family:'Sora';font-weight:800;font-size:14px;color:#7BE7F2;min-width:38px;text-align:right">{{ progressPct }}%</span>
      </div>
    </div>
  </header>

  <main style="flex:1">

    <!-- ============ ACCUEIL ============ -->
    <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <div style="animation:rbFade .4s ease both">

      <!-- HERO -->
      <section style="position:relative;background:radial-gradient(1000px 480px at 78% -12%,rgba(69,216,232,.13),transparent 62%),radial-gradient(760px 420px at -8% 108%,rgba(91,141,239,.10),transparent 60%),#0A0E15;color:#F1F5FB;overflow:hidden">
        <div style="position:absolute;inset:0;opacity:.55;background-image:linear-gradient(rgba(151,180,220,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(151,180,220,.055) 1px,transparent 1px);background-size:36px 36px;mask-image:linear-gradient(180deg,rgba(0,0,0,.9),transparent 88%);-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.9),transparent 88%)"></div>
        <div style="max-width:1180px;margin:0 auto;padding:56px 28px 46px;position:relative">
          <div style="display:grid;grid-template-columns:1.08fr .92fr;gap:46px;align-items:center">
            <div class="rb-reveal">
              <div style="display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(69,216,232,.35);background:rgba(69,216,232,.06);border-radius:99px;padding:6px 14px;margin-bottom:24px">
                <span style="width:7px;height:7px;border-radius:50%;background:#45D8E8;box-shadow:0 0 10px rgba(69,216,232,.9);animation:rbPulse 2s ease-in-out infinite"></span>
                <span style="font-family:'Spline Sans Mono';font-size:10.5px;letter-spacing:.14em;color:#8FD8E4">MANUEL DE L'OPÉRATEUR · OM 10667 · R0</span>
              </div>
              <h1 style="font-family:'Sora';font-weight:800;font-size:54px;line-height:.98;letter-spacing:-.02em;margin:0 0 20px">Maîtriser le<br><span style="background:linear-gradient(92deg,#7BE7F2 0%,#45D8E8 55%,#3B9EDD 100%);-webkit-background-clip:text;background-clip:text;color:transparent">RodBot LP</span></h1>
              <p style="font-size:17.5px;line-height:1.55;color:#93A1B5;max-width:530px;margin:0 0 30px">Formation complète à l'exploitation du système robotisé de manutention de tiges de forage — bâtie sur l'intégralité du manuel de l'opérateur. Chaque leçon renvoie à la page exacte du document.</p>
              <div style="display:flex;gap:14px;flex-wrap:wrap">
                <button onClick="{{ startFirst }}" style="background:#45D8E8;color:#06222A;border:none;border-radius:8px;padding:15px 26px;font-family:'Sora';font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 10px 30px -10px rgba(69,216,232,.55);transition:transform .15s,background .15s,box-shadow .15s" style-hover="background:#7BE7F2;transform:translateY(-2px);box-shadow:0 16px 36px -10px rgba(69,216,232,.65)">{{ ctaLabel }} →</button>
                <button onClick="{{ scrollToSafety }}" style="background:rgba(151,180,220,.06);color:#F1F5FB;border:1px solid rgba(151,180,220,.28);border-radius:8px;padding:15px 24px;font-family:'Sora';font-weight:700;font-size:15px;cursor:pointer;transition:border-color .15s,background .15s" style-hover="border-color:rgba(69,216,232,.6);background:rgba(69,216,232,.08)">L'essentiel sécurité</button>
              </div>
            </div>
            <div class="rb-hero-img" style="position:relative">
              <div style="position:absolute;left:-16px;top:20px;right:16px;bottom:-20px;border:1px solid rgba(69,216,232,.28);border-radius:14px"></div>
              <div style="position:relative;background:linear-gradient(165deg,#FAFCFE 0%,#E2E9F2 100%);border:1px solid rgba(151,180,220,.25);border-radius:14px;overflow:hidden;box-shadow:0 34px 80px -38px rgba(0,0,0,.95)">
                <div class="hz-stripe" style="height:10px"></div>
                <img src="img/eq-machine.png" alt="Le RodBot LP — mât replié sur le bac à tiges, porteur à chenilles" style="display:block;width:100%;height:auto;padding:12px 16px 0">
                <div style="display:flex;justify-content:space-between;gap:12px;padding:10px 16px 12px;font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.12em;color:#5D6B80">
                  <span>BORTERRA RODBOT LP · RENDU 3D</span>
                  <span>BAC 38×5"×6'</span>
                </div>
              </div>
            </div>
          </div>
          <div class="rb-reveal rb-d3" style="margin-top:38px;background:rgba(151,180,220,.06);border:1px solid rgba(151,180,220,.14);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:12px;padding:18px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap">
            <div style="font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.16em;color:#66788F;flex:none;line-height:1.6">FICHE<br>MACHINE</div>
            <div style="flex:1;min-width:0;display:grid;grid-template-columns:repeat(5,1fr);gap:20px">
              <div style="border-left:1px dashed rgba(151,180,220,.24);padding-left:18px"><div style="color:#93A1B5;font-size:12px;margin-bottom:5px">Système</div><div style="font-family:'Sora';font-weight:700;font-size:13.5px">Borterra RodBot LP</div></div>
              <div style="border-left:1px dashed rgba(151,180,220,.24);padding-left:18px"><div style="color:#93A1B5;font-size:12px;margin-bottom:5px">Tâche / Client</div><div style="font-family:'Sora';font-weight:700;font-size:13.5px">BM260024 · Machines Roger Intl</div></div>
              <div style="border-left:1px dashed rgba(151,180,220,.24);padding-left:18px"><div style="color:#93A1B5;font-size:12px;margin-bottom:5px">Commande</div><div style="font-family:'Sora';font-weight:700;font-size:13.5px">Radio (RRC) · 6 modes</div></div>
              <div style="border-left:1px dashed rgba(151,180,220,.24);padding-left:18px"><div style="color:#93A1B5;font-size:12px;margin-bottom:5px">Arrêts d'urgence</div><div style="font-family:'Sora';font-weight:700;font-size:13.5px">4 emplacements</div></div>
              <div style="border-left:1px dashed rgba(151,180,220,.24);padding-left:18px"><div style="color:#93A1B5;font-size:12px;margin-bottom:5px">Contenu</div><div style="font-family:'Sora';font-weight:700;font-size:13.5px">{{ totalSections }} leçons · {{ totalModules }} modules</div></div>
            </div>
          </div>
        </div>
      </section>

      <!-- PARCOURS -->
      <section style="max-width:1180px;margin:0 auto;padding:54px 28px 24px">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap">
          <div>
            <div style="font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;color:#58B7C8;margin-bottom:8px">01 — PARCOURS DE FORMATION</div>
            <h2 style="font-family:'Sora';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0;color:#F1F5FB">Les huit modules</h2>
          </div>
          <div style="font-size:14px;color:#93A1B5;max-width:340px;text-align:right">Complétez chaque module et réussissez son quiz pour débloquer votre attestation.</div>
        </div>

        <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
          <sc-for list="{{ moduleCards }}" as="m" hint-placeholder-count="8">
            <button onClick="{{ m.open }}" style="text-align:left;background:#121927;border:1px solid rgba(151,180,220,.14);border-radius:12px;padding:0;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;display:flex;flex-direction:column" style-hover="transform:translateY(-4px);box-shadow:0 18px 44px -20px rgba(0,0,0,.9),0 0 26px -8px rgba(69,216,232,.3);border-color:rgba(69,216,232,.45)">
              <div style="height:5px;background: {{ m.bar }}"></div>
              <div style="padding:20px 20px 18px;flex:1;display:flex;flex-direction:column">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">
                  <span style="font-family:'Sora';font-weight:800;font-size:38px;line-height:.8;color:rgba(151,180,220,.22)">{{ m.num }}</span>
                  <span style="display:inline-flex;align-items:center;gap:6px;font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.08em;padding:5px 10px;border-radius:99px;background: {{ m.statusBg }};color: {{ m.statusFg }}">{{ m.statusLabel }}</span>
                </div>
                <h3 style="font-family:'Sora';font-weight:700;font-size:18px;line-height:1.15;margin:0 0 8px;color:#F1F5FB">{{ m.title }}</h3>
                <p style="font-size:13px;line-height:1.5;color:#93A1B5;margin:0 0 16px;flex:1">{{ m.subtitle }}</p>
                <div style="display:flex;align-items:center;gap:12px;padding-top:12px;border-top:1px solid rgba(151,180,220,.12)">
                  <span style="font-family:'Spline Sans Mono';font-size:11px;color:#66788F">{{ m.sectionCount }} leçons</span>
                  <span style="font-family:'Spline Sans Mono';font-size:11px;color:#45D8E8">p. {{ m.pages }}</span>
                </div>
              </div>
            </button>
          </sc-for>
        </div>
      </section>

      <!-- L'ÉQUIPEMENT EN UN COUP D'ŒIL -->
      <section style="background:#0D141F;color:#F1F5FB;margin:46px 0 8px;border-top:1px solid rgba(151,180,220,.14);border-bottom:1px solid rgba(151,180,220,.14);box-shadow:inset 0 1px 0 rgba(69,216,232,.12)">
        <div style="max-width:1180px;margin:0 auto;padding:42px 28px 46px">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap">
            <div>
              <div style="font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;color:#66788F;margin-bottom:8px">L'ÉQUIPEMENT — EN UN COUP D'ŒIL</div>
              <h2 style="font-family:'Sora';font-weight:800;font-size:26px;letter-spacing:-.01em;margin:0;color:#F1F5FB">La machine, telle que vous la retrouverez</h2>
            </div>
            <div style="font-family:'Spline Sans Mono';font-size:10.5px;color:#66788F;letter-spacing:.06em">FIGURES & ÉCRANS DU MANUEL</div>
          </div>
          <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
            <div class="rb-img-card" style="background:rgba(151,180,220,.05);border:1px solid rgba(151,180,220,.13);border-radius:12px;overflow:hidden">
              <div class="rb-img-frame" style="background:#F4F7FB;height:190px">
                <img src="img/eq-labeled.png" alt="Rendu annoté du bac à tiges — pattes de retenue latérales et fourreaux de fourches" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 42%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.12em;color:#7BE7F2;margin-bottom:6px">LE BAC À TIGES</div>
                <div style="font-size:12.5px;line-height:1.5;color:#93A1B5">Plateau amovible de 35 tiges — pattes de retenue latérales et fourreaux de fourches pour la manutention.</div>
              </div>
            </div>
            <div class="rb-img-card" style="background:rgba(151,180,220,.05);border:1px solid rgba(151,180,220,.13);border-radius:12px;overflow:hidden">
              <div class="rb-img-frame" style="background:#F4F7FB;height:190px">
                <img src="img/eq-transport.png" alt="Position du mât pour le transport — bac plein et bac vide" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 60%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.12em;color:#7BE7F2;margin-bottom:6px">POSITION TRANSPORT</div>
                <div style="font-size:12.5px;line-height:1.5;color:#93A1B5">Mât replié sur le bac, plein ou vide — la pose de déplacement qui garantit la stabilité de la machine.</div>
              </div>
            </div>
            <div class="rb-img-card" style="background:rgba(151,180,220,.05);border:1px solid rgba(151,180,220,.13);border-radius:12px;overflow:hidden">
              <div class="rb-img-frame" style="background:#F4F7FB;height:190px">
                <img src="img/eq-hmi.png" alt="Écran tactile IHM du RodBot — Direct Mode" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;object-position:50% 30%">
              </div>
              <div style="padding:15px 17px 16px">
                <div style="font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.12em;color:#7BE7F2;margin-bottom:6px">L'IHM EMBARQUÉE</div>
                <div style="font-size:12.5px;line-height:1.5;color:#93A1B5">L'écran tactile du panneau — modes, diagnostics, alarmes et calibrage, couverts au module 05.</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ESSENTIEL SÉCURITÉ -->
      <section id="rb-safety" style="max-width:1180px;margin:0 auto;padding:44px 28px 10px;scroll-margin-top:80px">
        <div style="font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;color:#58B7C8;margin-bottom:8px">02 — À CONNAÎTRE PAR CŒUR</div>
        <h2 style="font-family:'Sora';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0 0 6px;color:#F1F5FB">L'essentiel sécurité</h2>
        <p style="font-size:15px;line-height:1.55;color:#93A1B5;max-width:640px;margin:0 0 28px">Avant toute manœuvre, ces quatre réflexes doivent être automatiques.</p>

        <div style="display:grid;grid-template-columns:1.05fr .95fr;gap:18px;align-items:stretch">
          <div style="background:#121927;border:1px solid rgba(151,180,220,.14);color:#E7EDF5;border-radius:14px;padding:24px;display:flex;flex-direction:column">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <span style="width:30px;height:30px;border-radius:50%;background:#FF4438;box-shadow:0 0 18px -2px rgba(255,84,73,.7);flex:none;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:13px;color:#fff">4</span>
              <span style="font-family:'Sora';font-weight:800;font-size:17px;color:#F1F5FB">Arrêts d'urgence <span style="color:#66788F;font-weight:600;font-size:13px">· p. 12</span></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1">
              <sc-for list="{{ estops }}" as="e" hint-placeholder-count="4">
                <div style="border:1px solid rgba(151,180,220,.16);background:rgba(151,180,220,.04);border-radius:9px;padding:12px 13px">
                  <div style="font-family:'Spline Sans Mono';font-size:9.5px;letter-spacing:.1em;color:#FF8A80;margin-bottom:4px">{{ e.where }}</div>
                  <div style="font-size:12.5px;line-height:1.4;color:#C5D0DF">{{ e.detail }}</div>
                </div>
              </sc-for>
            </div>
            <div style="margin-top:14px;font-size:12.5px;line-height:1.5;color:#93A1B5">Couplé à la foreuse mère : un arrêt d'urgence sur l'une déclenche l'arrêt des <strong style="color:#E7EDF5">deux machines</strong>.</div>
            <div style="margin-top:14px;flex:1;min-height:150px;position:relative;border:1px solid rgba(151,180,220,.16);border-radius:9px;overflow:hidden">
              <img src="img/eq-panel.png" alt="Champignon d'arrêt d'urgence sur le panneau hydraulique du RodBot" style="position:absolute;inset:0;display:block;width:100%;height:100%;object-fit:cover;object-position:50% 12%">
              <div style="position:absolute;left:10px;bottom:9px;background:rgba(6,10,16,.8);border-radius:5px;padding:4px 9px;font-family:'Spline Sans Mono';font-size:9px;letter-spacing:.1em;color:#C9E9F0">LE CHAMPIGNON DU PANNEAU — PHOTO</div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:18px">
            <div style="background:#121927;border:1px solid rgba(151,180,220,.14);border-radius:14px;padding:22px 24px">
              <div style="font-family:'Sora';font-weight:800;font-size:16px;margin-bottom:14px;color:#F1F5FB">Voyant ambre <span style="color:#66788F;font-weight:600;font-size:13px">· p. 20</span></div>
              <div style="display:flex;flex-direction:column;gap:11px">
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#FFB020;flex:none;box-shadow:0 0 12px rgba(255,176,32,.8)"></span><span style="font-size:13.5px;color:#C5D0DF"><strong>Fixe</strong> — commande À DISTANCE active</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#FFB020;flex:none;box-shadow:0 0 12px rgba(255,176,32,.8);animation:rbPulse 1.2s ease-in-out infinite"></span><span style="font-size:13.5px;color:#C5D0DF"><strong>Clignotant</strong> — mât en TRAJECTOIRE ou déplacement en RALENTI</span></div>
                <div style="display:flex;align-items:center;gap:12px"><span style="width:14px;height:14px;border-radius:50%;background:#39424F;flex:none;border:1px solid rgba(151,180,220,.28)"></span><span style="font-size:13.5px;color:#C5D0DF"><strong>Éteint</strong> — mode LOCAL</span></div>
              </div>
            </div>
            <div style="background:rgba(255,84,73,.08);border:1px solid rgba(255,84,73,.3);border-left:5px solid #FF5449;border-radius:12px;padding:18px 20px;flex:1">
              <div style="font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.12em;color:#FF8A80;margin-bottom:6px">⚠ AUCUN SYSTÈME DE VISION · P. 63</div>
              <div style="font-size:13.5px;line-height:1.55;color:#D9DFE8">Le RodBot ne détecte <strong>ni le personnel ni les équipements</strong> dans sa zone de travail. Une <strong>barrière</strong> doit séparer l'opérateur de la machine et de la foreuse (p. 45) — pilotage radio de part et d'autre.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- SIMULATEURS -->
      <section style="max-width:1180px;margin:0 auto;padding:44px 28px 10px">
        <div style="font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;color:#58B7C8;margin-bottom:8px">03 — APPRENDRE EN MANIPULANT</div>
        <h2 style="font-family:'Sora';font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0 0 6px;color:#F1F5FB">Les simulateurs interactifs</h2>
        <p style="font-size:15px;line-height:1.55;color:#93A1B5;max-width:640px;margin:0 0 28px">Explorez les composants réels de la machine — photos du manuel à l'appui — avant de poser les mains dessus.</p>
        <div class="rb-stagger" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">

    <!-- ============ MODULE ============ -->

                <div style="font-family:'Sora';font-weight:700;font-size:12px;line-height:1.2;color:#101826;margin-bottom:5px">{{ cm.short }}</div>
                <div style="font-family:'Sora';font-weight:800;font-size:13px;color:#0E9F6E">{{ cm.score }}%</div>
              </div>
            </sc-for>
          </div>

          <div style="display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(16,24,38,.16);padding-top:18px;flex-wrap:wrap;gap:14px">
            <div style="text-align:left">
              <div style="font-family:'Spline Sans Mono';font-size:10px;color:#5D6B80;letter-spacing:.08em">DATE DE DÉLIVRANCE</div>
              <div style="font-family:'Sora';font-weight:700;font-size:14px">{{ certDate }}</div>
            </div>
            <div style="text-align:left">
              <div style="font-family:'Spline Sans Mono';font-size:10px;color:#5D6B80;letter-spacing:.08em">RÉFÉRENCE</div>
              <div style="font-family:'Sora';font-weight:700;font-size:14px">OM 10667 · R0 · BM260024</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Spline Sans Mono';font-size:10px;color:#5D6B80;letter-spacing:.08em">SCORE GLOBAL</div>
              <div style="font-family:'Sora';font-weight:800;font-size:20px;color:#0B7C90">{{ overallScore }}%</div>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align:center;margin-top:24px">
        <button onClick="{{ goHome }}" style="background:rgba(151,180,220,.08);color:#E7EDF5;border:1px solid rgba(151,180,220,.25);border-radius:8px;padding:13px 26px;font-family:'Sora';font-weight:800;font-size:14px;cursor:pointer;transition:border-color .15s,background .15s" style-hover="border-color:rgba(69,216,232,.55);background:rgba(69,216,232,.08)">Retour à l'accueil</button>
      </div>
    </div>
    </sc-if>

  </main>
</div>
</script>

<script src="app.js"></script>
</body>
</html>
